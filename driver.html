              {/* Actions */}
              <div style={{ display: 'flex', gap: 10, marginTop: 16, paddingTop: 16, borderTop: '1px solid #e2e8f0' }}>
                <button className="btn btn-primary flex-1 justify-center" onClick={save} disabled={saving} style={{ fontSize: 17 }}>
                  {saving ? <Spinner /> : <><Icon name="Save" size={18} /> Save Docket</>}
                </button>
                <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ── Active Delivery View ────────────────────────────────────
const ActiveDeliveryView = ({ delivery, token, user, onComplete }) => {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [qrInput, setQrInput] = useState('');
  const [assignModal, setAssignModal] = useState(null); // { qr_code, scan_result }
  const [bulkMode, setBulkMode] = useState(false);
  const [completing, setCompleting] = useState(false);

  const loadItems = useCallback(async () => {
    setLoading(true);
    try {
      const d = await api(`/timber/deliveries/${delivery.id}/items`, {}, token).catch(() => []);
      setItems(Array.isArray(d) ? d : (d.items || []));
    } catch (e) { toast(e.message, 'error'); }
    setLoading(false);
  }, [delivery.id, token]);

  useEffect(() => { loadItems(); }, [loadItems]);

  const handleScan = (qr) => {
    if (!qr.trim()) return;
    setAssignModal({ qr_code: qr.trim(), delivery_id: delivery.id });
    setQrInput('');
  };

  const completeDelivery = async () => {
    if (!window.confirm('Mark this delivery as complete? All unassigned packs will remain unassigned.')) return;
    setCompleting(true);
    try {
      await api(`/timber/deliveries/${delivery.id}/complete`, { method: 'POST' }, token);
      toast('Delivery marked complete', 'success');
      onComplete();
    } catch (e) { toast(e.message, 'error'); }
    setCompleting(false);
  };

  const allComplete = items.length > 0 && items.every(it => (it.assigned_packs || 0) >= (it.expected_packs || 0));

  if (loading) return <div className="flex justify-center py-12"><Spinner /></div>;

  return (
    <div className="space-y-4">
      {/* Delivery header */}
      <div className="hp-card" style={{ borderLeft: '4px solid #07324C' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
          <div>
            <div style={{ fontWeight: 800, fontSize: 18, color: '#07324C' }}>{delivery.supplier_name}</div>
            <div style={{ fontSize: 15, color: '#6b7280' }}>
              Docket: <span style={{ fontFamily: 'monospace', fontWeight: 700 }}>{delivery.docket_number}</span>
              {' · '}{delivery.delivery_date?.split('T')[0]}
            </div>
          </div>
          <div style={{ marginLeft: 'auto' }}>
            <TimberStatusBadge status={delivery.status} />
          </div>
        </div>
      </div>

      {/* Line items progress */}
      <div className="hp-card">
        <h3 style={{ fontWeight: 700, color: '#07324C', marginBottom: 12 }}>Line Items Progress</h3>
        <table className="hp-table">
          <thead><tr><th>Description</th><th>Spec</th><th>Expected</th><th>Assigned</th><th>Progress</th></tr></thead>
          <tbody>
            {items.map(item => {
              const pct = item.expected_packs > 0 ? Math.round(((item.assigned_packs || 0) / item.expected_packs) * 100) : 0;
              return (
                <tr key={item.id}>
                  <td>{item.description || '—'}</td>
                  <td style={{ fontFamily: 'monospace', fontSize: 14 }}>{item.myob_code || '—'}</td>
                  <td>{item.expected_packs}</td>
                  <td style={{ fontWeight: 700 }}>{item.assigned_packs || 0}</td>
                  <td style={{ minWidth: 140 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <div className="progress-bar-bg" style={{ flex: 1, height: 10 }}>
                        <div className="progress-bar-fill" style={{ width: `${pct}%`, background: pct >= 100 ? '#22C55E' : '#07324C' }} />
                      </div>
                      <span style={{ fontSize: 14, fontWeight: 700, minWidth: 36 }}>{pct}%</span>
                    </div>
                  </td>
                </tr>
              );
            })}
            {items.length === 0 && <tr><td colSpan={5}><Empty msg="No line items" /></td></tr>}
          </tbody>
        </table>
      </div>

      {/* QR Scanner section */}
      <div className="hp-card">
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
          <h3 style={{ fontWeight: 700, color: '#07324C' }}>Scan Pack QR</h3>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <span style={{ fontSize: 14, color: '#6b7280' }}>Bulk mode:</span>
            <button
              style={{ padding: '5px 12px', borderRadius: 20, border: 'none', cursor: 'pointer', fontWeight: 700, fontSize: 14, background: bulkMode ? '#07324C' : '#e5e7eb', color: bulkMode ? '#fff' : '#374151' }}
              onClick={() => setBulkMode(v => !v)}
            >{bulkMode ? 'ON' : 'OFF'}</button>
          </div>
        </div>
        <p style={{ fontSize: 14, color: '#6b7280', marginBottom: 12 }}>Type pack ID or scan with camera. Press Enter or click Go to assign.</p>
        <QRInput value={qrInput} onChange={setQrInput} onSubmit={handleScan} placeholder="e.g. EP-00042" autoFocus={true} />
        {bulkMode && <p style={{ fontSize: 14, color: '#1D4ED8', marginTop: 10, fontWeight: 600 }}>Bulk mode: modal will stay open after each scan</p>}
      </div>

      {/* Complete delivery */}
      {allComplete && (
        <div style={{ background: '#F0FDF4', border: '1px solid #BBF7D0', borderRadius: 8, padding: 16, display: 'flex', alignItems: 'center', gap: 16 }}>
          <Icon name="CheckCircle" size={28} />
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 700, color: '#166534' }}>All packs assigned!</div>
            <div style={{ fontSize: 14, color: '#166534' }}>You can now confirm this delivery as complete.</div>
          </div>
          <button className="btn btn-success" onClick={completeDelivery} disabled={completing}>
            {completing ? <Spinner /> : <><Icon name="CheckCircle" size={18} /> Confirm Delivery Complete</>}
          </button>
        </div>
      )}

      {/* Assign Modal */}
      {assignModal && (
        <AssignPackModal
          qrCode={assignModal.qr_code}
          deliveryId={assignModal.delivery_id}
          items={items}
          token={token}
          bulkMode={bulkMode}
          onAssigned={() => { loadItems(); if (!bulkMode) setAssignModal(null); else setAssignModal(null); }}
          onClose={() => setAssignModal(null)}
        />
      )}
    </div>
  );
};

// ── Assign Pack Modal ──────────────────────────────────────────
const AssignPackModal = ({ qrCode, deliveryId, items, token, bulkMode, onAssigned, onClose }) => {
  const [selectedItem, setSelectedItem] = useState(items.find(it => (it.assigned_packs || 0) < (it.expected_packs || 0))?.id || '');
  const [saving, setSaving] = useState(false);
  const [nextQr, setNextQr] = useState('');

  const assign = async () => {
    if (!selectedItem) { toast('Select a line item', 'warning'); return; }
    setSaving(true);
    try {
      await api('/timber/packs', {
        method: 'POST',
        body: JSON.stringify({ qr_code: qrCode, delivery_id: deliveryId, delivery_item_id: selectedItem })
      }, token);
      toast(`Pack ${qrCode} assigned`, 'success');
      onAssigned();
    } catch (e) { toast(e.message, 'error'); }
    setSaving(false);
  };

  const unassignedItems = items.filter(it => (it.assigned_packs || 0) < (it.expected_packs || 0));

  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16 }}>
      <div style={{ background: 'white', borderRadius: 12, width: '100%', maxWidth: 480, boxShadow: '0 20px 60px rgba(0,0,0,0.3)' }}>
        <div style={{ padding: '20px 24px', borderBottom: '1px solid #e2e8f0' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <Icon name="ScanLine" size={22} />
            <h2 style={{ fontWeight: 900, color: '#07324C', fontSize: 20, margin: 0, flex: 1 }}>Assign Pack</h2>
            <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 22, color: '#9ca3af' }}>×</button>
          </div>
        </div>
        <div style={{ padding: '20px 24px' }}>
          <div style={{ background: '#EFF6FF', borderRadius: 8, padding: 14, marginBottom: 16, textAlign: 'center' }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: '#1D4ED8', textTransform: 'uppercase', marginBottom: 4 }}>Scanned QR</div>
            <div style={{ fontFamily: 'monospace', fontSize: 28, fontWeight: 900, color: '#07324C' }}>{qrCode}</div>
          </div>
          <div style={{ marginBottom: 16 }}>
            <label className="hp-label">Assign to Line Item *</label>
            <select className="hp-input" value={selectedItem} onChange={e => setSelectedItem(e.target.value)}>
              <option value="">— Select —</option>
              {unassignedItems.map(it => (
                <option key={it.id} value={it.id}>
                  {it.description || it.myob_code} — {it.assigned_packs || 0}/{it.expected_packs} packs
                </option>
              ))}
              {unassignedItems.length === 0 && <option disabled>All items fully assigned</option>}
            </select>
          </div>
          <div style={{ display: 'flex', gap: 10 }}>
            <button className="btn btn-primary flex-1 justify-center" onClick={assign} disabled={saving} style={{ fontSize: 17, padding: '12px 0' }}>
              {saving ? <Spinner /> : <><Icon name="CheckCircle" size={18} /> Assign & Receive</>}
            </button>
            <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
          </div>
          {bulkMode && <p style={{ marginTop: 12, fontSize: 14, color: '#1D4ED8', fontWeight: 600, textAlign: 'center' }}>After assign, scan next pack…</p>}
        </div>
      </div>
    </div>
  );
};

// ── Yardsman Consume Sub-view ──────────────────────────────────
const YardsmanConsume = ({ token, user, onBack }) => {
  const [qrInput, setQrInput] = useState('');
  const [packInfo, setPackInfo] = useState(null);
  const [loading, setLoading] = useState(false);
  const [destination, setDestination] = useState('chainsaw');
  const [zone, setZone] = useState('viking');
  const [consuming, setConsuming] = useState(false);
  const [recentConsumes, setRecentConsumes] = useState([]);
  const [undoModal, setUndoModal] = useState(null);
  const [undoReason, setUndoReason] = useState('');

  const zones = ['viking', 'handmade', 'dtl', 'crates'];

  const lookupPack = async (qr) => {
    if (!qr.trim()) return;
    setLoading(true);
    setPackInfo(null);
    try {
      const p = await api(`/timber/packs/${encodeURIComponent(qr)}`, {}, token);
      setPackInfo(p);
    } catch (e) { toast(e.message, 'error'); }
    setLoading(false);
  };

  const consume = async () => {
    if (!packInfo) return;
    setConsuming(true);
    try {
      await api(`/timber/packs/${encodeURIComponent(packInfo.qr_code)}/yardsman-consume`, {
        method: 'POST',
        body: JSON.stringify({ destination, zone: destination === 'production' ? zone : null })
      }, token);
      toast(`Pack ${packInfo.qr_code} consumed`, 'success');
      setRecentConsumes(prev => [{ qr_code: packInfo.qr_code, consumed_at: new Date().toISOString(), destination }, ...prev.slice(0, 4)]);
      setPackInfo(null);
      setQrInput('');
    } catch (e) { toast(e.message, 'error'); }
    setConsuming(false);
  };

  const doUndo = async () => {
    if (!undoModal) return;
    try {
      await api(`/timber/packs/${encodeURIComponent(undoModal.qr_code)}/undo-consume`, {
        method: 'POST',
        body: JSON.stringify({ reason: undoReason || 'Undone by yardsman' })
      }, token);
      toast('Consume undone', 'info');
      setRecentConsumes(prev => prev.filter(c => c.qr_code !== undoModal.qr_code));
      setUndoModal(null);
      setUndoReason('');
    } catch (e) { toast(e.message, 'error'); }
  };

  return (
    <div className="space-y-4">
      <div className="hp-card">
        <h2 style={{ fontWeight: 800, color: '#07324C', fontSize: 20, marginBottom: 14 }}>Consume Pack</h2>
        <p style={{ fontSize: 15, color: '#6b7280', marginBottom: 12 }}>Scan QR or type pack ID to look up and consume</p>
        <QRInput value={qrInput} onChange={setQrInput} onSubmit={lookupPack} placeholder="e.g. EP-00042" autoFocus />
      </div>

      {loading && <div className="flex justify-center py-8"><Spinner /></div>}

      {packInfo && (
        <div className="hp-card" style={{ borderLeft: '4px solid #07324C' }}>
          <h3 style={{ fontWeight: 800, color: '#07324C', marginBottom: 14 }}>Pack Details</h3>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 20 }}>
            <div><span style={{ fontSize: 13, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase' }}>QR Code</span><div style={{ fontFamily: 'monospace', fontWeight: 900, fontSize: 20, color: '#07324C' }}>{packInfo.qr_code}</div></div>
            <div><span style={{ fontSize: 13, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase' }}>Spec</span><div style={{ fontFamily: 'monospace', fontWeight: 700, fontSize: 17 }}>{packInfo.spec_label || `${packInfo.width_mm}×${packInfo.thickness_mm}×${packInfo.length_mm}`}</div></div>
            <div><span style={{ fontSize: 13, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase' }}>MYOB Code</span><div style={{ fontFamily: 'monospace', fontWeight: 600 }}>{packInfo.myob_code || '—'}</div></div>
            <div><span style={{ fontSize: 13, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase' }}>Supplier</span><div style={{ fontWeight: 600 }}>{packInfo.supplier_name || '—'}</div></div>
            <div><span style={{ fontSize: 13, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase' }}>Pieces</span><div style={{ fontWeight: 700, fontSize: 18 }}>{packInfo.pieces || '—'}</div></div>
            <div><span style={{ fontSize: 13, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase' }}>Volume</span><div style={{ fontWeight: 700, fontSize: 18 }}>{fmtCbm(packInfo.volume_m3)}</div></div>
            <div><span style={{ fontSize: 13, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase' }}>Received</span><div style={{ fontWeight: 600 }}>{packInfo.received_date?.split('T')[0] || '—'}</div></div>
            <div><span style={{ fontSize: 13, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase' }}>Status</span><div><TimberStatusBadge status={packInfo.status} /></div></div>
          </div>

          {packInfo.status === 'consumed' ? (
            <div style={{ background: '#FEE2E2', borderRadius: 8, padding: 14, marginBottom: 16 }}>
              <span style={{ fontWeight: 700, color: '#991B1B' }}>Already consumed by {packInfo.consumed_by_name || 'unknown'} on {packInfo.consumed_at?.split('T')[0]}</span>
            </div>
          ) : (
            <>
              <div style={{ marginBottom: 16 }}>
                <label className="hp-label">Destination</label>
                <div style={{ display: 'flex', gap: 10, marginTop: 6 }}>
                  {[['chainsaw', 'Chainsaw', 'Axe'], ['production', 'Direct Production', 'Factory']].map(([v, l, ic]) => (
                    <button key={v}
                      style={{ flex: 1, padding: '12px 16px', borderRadius: 8, border: `2px solid ${destination === v ? '#07324C' : '#e2e8f0'}`, background: destination === v ? '#07324C' : 'white', color: destination === v ? '#fff' : '#374151', fontWeight: 700, fontSize: 16, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}
                      onClick={() => setDestination(v)}>
                      <Icon name={ic} size={18} />{l}
                    </button>
                  ))}
                </div>
              </div>
              {destination === 'production' && (
                <div style={{ marginBottom: 16 }}>
                  <label className="hp-label">Zone</label>
                  <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginTop: 6 }}>
                    {zones.map(z => (
                      <button key={z}
                        style={{ padding: '10px 18px', borderRadius: 8, border: `2px solid ${zone === z ? '#07324C' : '#e2e8f0'}`, background: zone === z ? '#07324C' : 'white', color: zone === z ? '#fff' : '#374151', fontWeight: 700, fontSize: 15, cursor: 'pointer', textTransform: 'capitalize' }}
                        onClick={() => setZone(z)}>{z}</button>
                    ))}
                  </div>
                </div>
              )}
              <button className="btn btn-primary w-full justify-center" onClick={consume} disabled={consuming} style={{ fontSize: 18, padding: '14px 0', borderRadius: 10 }}>
                {consuming ? <Spinner /> : <><Icon name="CheckCircle" size={20} /> Consume Pack</>}
              </button>
            </>
          )}
        </div>
      )}

      {recentConsumes.length > 0 && (
        <div className="hp-card">
          <h3 style={{ fontWeight: 700, color: '#07324C', marginBottom: 12 }}>Recently Consumed (this session)</h3>
          {recentConsumes.map(c => (
            <div key={c.qr_code} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 0', borderBottom: '1px solid #e2e8f0' }}>
              <span style={{ fontFamily: 'monospace', fontWeight: 700, color: '#07324C', fontSize: 16 }}>{c.qr_code}</span>
              <span style={{ fontSize: 14, color: '#6b7280', textTransform: 'capitalize' }}>{c.destination}</span>
              <span style={{ fontSize: 13, color: '#9ca3af' }}>{new Date(c.consumed_at).toLocaleTimeString()}</span>
              <button className="btn btn-warning btn-sm" style={{ marginLeft: 'auto' }} onClick={() => { setUndoModal(c); setUndoReason(''); }}>
                Undo
              </button>
            </div>
          ))}
        </div>
      )}

      {undoModal && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16 }}>
          <div style={{ background: 'white', borderRadius: 12, width: '100%', maxWidth: 440, padding: 28, boxShadow: '0 20px 60px rgba(0,0,0,0.3)' }}>
            <h2 style={{ fontWeight: 900, color: '#D97706', marginBottom: 8 }}>Undo Consume</h2>
            <p style={{ fontSize: 15, color: '#374151', marginBottom: 16 }}>
              Undo consume of <strong style={{ fontFamily: 'monospace' }}>{undoModal.qr_code}</strong>? This action will be logged.
            </p>
            <div style={{ marginBottom: 16 }}>
              <label className="hp-label">Reason (optional)</label>
              <input className="hp-input" value={undoReason} onChange={e => setUndoReason(e.target.value)} placeholder="Reason for undo" />
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <button className="btn btn-warning flex-1 justify-center" onClick={doUndo}>Confirm Undo</button>
              <button className="btn btn-secondary" onClick={() => setUndoModal(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ── Chainsaw Scan & Consume Sub-page ────────────────────────────
const ChainsawScanPage = ({ token, user }) => {
  const [qrInput, setQrInput] = useState('');
  const [packInfo, setPackInfo] = useState(null);
  const [loading, setLoading] = useState(false);
  const [bulkMode, setBulkMode] = useState(false);
  const [bulkPacks, setBulkPacks] = useState([]); // up to 5
  const [confirmModal, setConfirmModal] = useState(null);
  const [recentConsumes, setRecentConsumes] = useState([]);
  const [undoModal, setUndoModal] = useState(null);
  const [undoReason, setUndoReason] = useState('');
  const [consuming, setConsuming] = useState(false);

  const lookupPack = async (qr) => {
    if (!qr.trim()) return;
    if (bulkMode) {
      if (bulkPacks.length >= 5) { toast('Max 5 packs in bulk mode', 'warning'); return; }
      if (bulkPacks.find(p => p.qr_code === qr.trim())) { toast('Pack already in list', 'warning'); return; }
      setLoading(true);
      try {
        const p = await api(`/timber/packs/${encodeURIComponent(qr.trim())}`, {}, token);
        setBulkPacks(prev => [...prev, p]);
        toast(`Pack ${p.qr_code} added`, 'info');
      } catch (e) { toast(e.message, 'error'); }
      setQrInput('');
      setLoading(false);
      return;
    }
    setLoading(true);
    setPackInfo(null);
    try {
      const p = await api(`/timber/packs/${encodeURIComponent(qr.trim())}`, {}, token);
      setPackInfo(p);
    } catch (e) { toast(e.message, 'error'); }
    setLoading(false);
    setQrInput('');
  };

  const consumeSingle = async () => {
    if (!packInfo) return;
    setConsuming(true);
    try {
      await api(`/timber/packs/${encodeURIComponent(packInfo.qr_code)}/consume`, { method: 'POST' }, token);
      toast(`Pack ${packInfo.qr_code} consumed`, 'success');
      setRecentConsumes(prev => [{ qr_code: packInfo.qr_code, consumed_at: new Date().toISOString(), consumed_by_name: user?.full_name }, ...prev.slice(0, 4)]);
      setPackInfo(null);
      setConfirmModal(null);
    } catch (e) { toast(e.message, 'error'); }
    setConsuming(false);
  };

  const consumeBulk = async () => {
    setConsuming(true);
    try {
      const qrs = bulkPacks.map(p => p.qr_code);
      await api('/timber/packs/bulk-consume', { method: 'POST', body: JSON.stringify({ qr_codes: qrs }) }, token);
      toast(`${qrs.length} packs consumed`, 'success');
      setRecentConsumes(prev => [...bulkPacks.map(p => ({ qr_code: p.qr_code, consumed_at: new Date().toISOString(), consumed_by_name: user?.full_name })), ...prev].slice(0, 10));
      setBulkPacks([]);
      setConfirmModal(null);
    } catch (e) { toast(e.message, 'error'); }
    setConsuming(false);
  };

  const doUndo = async () => {
    if (!undoModal) return;
    try {
      await api(`/timber/packs/${encodeURIComponent(undoModal.qr_code)}/undo-consume`, {
        method: 'POST',
        body: JSON.stringify({ reason: undoReason || 'Undone by chainsaw operator' })
      }, token);
      toast('Consume undone', 'info');
      setRecentConsumes(prev => prev.filter(c => c.qr_code !== undoModal.qr_code));
      setUndoModal(null);
      setUndoReason('');
    } catch (e) { toast(e.message, 'error'); }
  };

  return (
    <div style={{ padding: 16 }}>
      {/* Top half: large scan area */}
      <div className="hp-card" style={{ textAlign: 'center', marginBottom: 16, padding: '28px 24px', borderTop: '4px solid #07324C' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
          <h2 style={{ fontWeight: 900, color: '#07324C', fontSize: 22 }}>Scan Pack QR</h2>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <span style={{ fontSize: 15, color: '#6b7280', fontWeight: 600 }}>Bulk:</span>
            <button
              style={{ padding: '7px 16px', borderRadius: 20, border: 'none', cursor: 'pointer', fontWeight: 700, fontSize: 15, background: bulkMode ? '#07324C' : '#e5e7eb', color: bulkMode ? '#fff' : '#374151' }}
              onClick={() => { setBulkMode(v => !v); setBulkPacks([]); setPackInfo(null); }}>
              {bulkMode ? 'Bulk ON' : 'Bulk OFF'}
            </button>
          </div>
        </div>
        <p style={{ fontSize: 15, color: '#6b7280', marginBottom: 16 }}>
          Type QR pack ID and press Enter, or tap Go
        </p>
        <QRInput value={qrInput} onChange={setQrInput} onSubmit={lookupPack} placeholder="EP-00042" autoFocus />
        {bulkMode && (
          <p style={{ fontSize: 14, color: '#1D4ED8', marginTop: 10, fontWeight: 600 }}>Scan up to 5 packs, then confirm all at once</p>
        )}
      </div>

      {loading && <div className="flex justify-center py-8"><Spinner /></div>}

      {/* Bulk list */}
      {bulkMode && bulkPacks.length > 0 && (
        <div className="hp-card" style={{ marginBottom: 16 }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
            <h3 style={{ fontWeight: 700, color: '#07324C' }}>Bulk Queue ({bulkPacks.length}/5)</h3>
            <button className="btn btn-primary" onClick={() => setConfirmModal({ type: 'bulk' })} disabled={bulkPacks.length === 0} style={{ fontSize: 16 }}>
              <Icon name="CheckCircle" size={18} /> Consume All
            </button>
          </div>
          {bulkPacks.map(p => (
            <div key={p.qr_code} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 0', borderBottom: '1px solid #e2e8f0' }}>
              <span style={{ fontFamily: 'monospace', fontWeight: 800, fontSize: 18, color: '#07324C' }}>{p.qr_code}</span>
              <span style={{ fontSize: 14, color: '#374151' }}>{p.spec_label || `${p.width_mm}×${p.thickness_mm}×${p.length_mm}`}</span>
              <span style={{ fontSize: 14, color: '#6b7280', marginLeft: 'auto' }}>{fmtCbm(p.volume_m3)}</span>
              <button className="btn btn-danger btn-sm" onClick={() => setBulkPacks(prev => prev.filter(x => x.qr_code !== p.qr_code))}>
                <Icon name="X" size={14} />
              </button>
            </div>
          ))}
        </div>
      )}

      {/* Single pack details */}
      {!bulkMode && packInfo && (
        <div className="hp-card" style={{ marginBottom: 16 }}>
          {/* FIFO advisory */}
          {packInfo.fifo_advisory && (
            <div style={{ background: '#FEF3C7', border: '1px solid #FDE68A', borderRadius: 8, padding: 14, marginBottom: 16, display: 'flex', alignItems: 'center', gap: 10 }}>
              <Icon name="AlertTriangle" size={20} />
              <span style={{ fontWeight: 700, color: '#92400E', fontSize: 15 }}>
                Older stock available — <span style={{ fontFamily: 'monospace' }}>{packInfo.fifo_advisory.older_qr}</span> received {packInfo.fifo_advisory.days_older} days earlier
              </span>
            </div>
          )}

          {packInfo.status === 'consumed' ? (
            <div style={{ background: '#FEE2E2', borderRadius: 8, padding: 18, textAlign: 'center' }}>
              <Icon name="XCircle" size={32} />
              <div style={{ fontWeight: 800, color: '#991B1B', fontSize: 18, marginTop: 8 }}>Already Consumed</div>
              <div style={{ color: '#991B1B', fontSize: 15, marginTop: 4 }}>
                by {packInfo.consumed_by_name || 'unknown'} on {packInfo.consumed_at?.split('T')[0]}
              </div>
            </div>
          ) : (
            <>
              <h3 style={{ fontWeight: 800, color: '#07324C', fontSize: 20, marginBottom: 16 }}>Pack Details</h3>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 20 }}>
                <div><div style={{ fontSize: 13, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', marginBottom: 2 }}>QR Code</div><div style={{ fontFamily: 'monospace', fontWeight: 900, fontSize: 22, color: '#07324C' }}>{packInfo.qr_code}</div></div>
                <div><div style={{ fontSize: 13, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', marginBottom: 2 }}>Spec</div><div style={{ fontFamily: 'monospace', fontWeight: 700, fontSize: 18 }}>{packInfo.spec_label || `${packInfo.width_mm}×${packInfo.thickness_mm}×${packInfo.length_mm}`}</div></div>
                <div><div style={{ fontSize: 13, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', marginBottom: 2 }}>MYOB Code</div><div style={{ fontFamily: 'monospace', fontWeight: 600, fontSize: 16 }}>{packInfo.myob_code || '—'}</div></div>
                <div><div style={{ fontSize: 13, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', marginBottom: 2 }}>Supplier</div><div style={{ fontWeight: 600, fontSize: 16 }}>{packInfo.supplier_name || '—'}</div></div>
                <div><div style={{ fontSize: 13, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', marginBottom: 2 }}>Pieces</div><div style={{ fontWeight: 800, fontSize: 22, color: '#07324C' }}>{packInfo.pieces || '—'}</div></div>
                <div><div style={{ fontSize: 13, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', marginBottom: 2 }}>Volume</div><div style={{ fontWeight: 800, fontSize: 22, color: '#07324C' }}>{fmtCbm(packInfo.volume_m3)}</div></div>
                <div><div style={{ fontSize: 13, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', marginBottom: 2 }}>Received</div><div style={{ fontWeight: 600, fontSize: 15 }}>{packInfo.received_date?.split('T')[0] || '—'}</div></div>
                <div><div style={{ fontSize: 13, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', marginBottom: 2 }}>Status</div><div><TimberStatusBadge status={packInfo.status} /></div></div>
              </div>
              <button className="btn btn-danger w-full justify-center" onClick={() => setConfirmModal({ type: 'single', pack: packInfo })} style={{ fontSize: 18, padding: '14px 0', borderRadius: 10 }}>
                <Icon name="Axe" size={22} /> Consume Pack
              </button>
            </>
          )}
        </div>
      )}

      {/* Recently consumed */}
      {recentConsumes.length > 0 && (
        <div className="hp-card">
          <h3 style={{ fontWeight: 700, color: '#07324C', marginBottom: 12 }}>Recently Consumed</h3>
          {recentConsumes.map(c => (
            <div key={c.qr_code} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 0', borderBottom: '1px solid #e2e8f0' }}>
              <span style={{ fontFamily: 'monospace', fontWeight: 700, fontSize: 17, color: '#07324C' }}>{c.qr_code}</span>
              <span style={{ fontSize: 13, color: '#9ca3af', marginLeft: 'auto' }}>{new Date(c.consumed_at).toLocaleTimeString()}</span>
              <button className="btn btn-warning btn-sm" onClick={() => { setUndoModal(c); setUndoReason(''); }}>Undo</button>
            </div>
          ))}
        </div>
      )}

      {/* Confirm Modal */}
      {confirmModal && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16 }}>
          <div style={{ background: 'white', borderRadius: 12, width: '100%', maxWidth: 440, padding: 28, boxShadow: '0 20px 60px rgba(0,0,0,0.3)' }}>
            <h2 style={{ fontWeight: 900, color: '#ED1C24', marginBottom: 10 }}>Confirm Consume</h2>
            {confirmModal.type === 'single' && (
              <p style={{ fontSize: 16, color: '#374151', marginBottom: 20 }}>
                Consume pack <strong style={{ fontFamily: 'monospace', fontSize: 18 }}>{confirmModal.pack?.qr_code}</strong>?
              </p>
            )}
            {confirmModal.type === 'bulk' && (
              <p style={{ fontSize: 16, color: '#374151', marginBottom: 20 }}>
                Consume {bulkPacks.length} pack{bulkPacks.length !== 1 ? 's' : ''}?<br />
                <span style={{ fontSize: 14, color: '#6b7280' }}>{bulkPacks.map(p => p.qr_code).join(', ')}</span>
              </p>
            )}
            <div style={{ display: 'flex', gap: 12 }}>
              <button className="btn btn-danger flex-1 justify-center" onClick={confirmModal.type === 'bulk' ? consumeBulk : consumeSingle} disabled={consuming} style={{ fontSize: 17, padding: '12px 0' }}>
                {consuming ? <Spinner /> : 'Confirm'}
              </button>
              <button className="btn btn-secondary" onClick={() => setConfirmModal(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* Undo Modal */}
      {undoModal && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16 }}>
          <div style={{ background: 'white', borderRadius: 12, width: '100%', maxWidth: 440, padding: 28, boxShadow: '0 20px 60px rgba(0,0,0,0.3)' }}>
            <h2 style={{ fontWeight: 900, color: '#D97706', marginBottom: 8 }}>Undo Consume</h2>
            <p style={{ fontSize: 15, color: '#374151', marginBottom: 16 }}>
              Are you sure you want to undo consume of <strong style={{ fontFamily: 'monospace' }}>{undoModal.qr_code}</strong>? This action will be logged.
            </p>
            <div style={{ marginBottom: 16 }}>
              <label className="hp-label">Reason (optional)</label>
              <input className="hp-input" value={undoReason} onChange={e => setUndoReason(e.target.value)} placeholder="Reason for undo" />
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <button className="btn btn-warning flex-1 justify-center" onClick={doUndo}>Confirm Undo</button>
              <button className="btn btn-secondary" onClick={() => setUndoModal(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ── Chainsaw Inventory Browser Sub-page ─────────────────────────
const ChainsawBrowsePage = ({ token, user }) => {
  const [packs, setPacks] = useState([]);
  const [suppliers, setSuppliers] = useState([]);
  const [specs, setSpecs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filterSupplier, setFilterSupplier] = useState('');
  const [filterSpec, setFilterSpec] = useState('');
  const [filterType, setFilterType] = useState('');
  const [search, setSearch] = useState('');

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const [p, s, sp] = await Promise.all([
        api('/timber/packs?status=inventory', {}, token).catch(() => []),
        api('/timber/suppliers', {}, token).catch(() => []),
        api('/timber/specs', {}, token).catch(() => []),
      ]);
      setPacks(Array.isArray(p) ? p : (p.packs || []));
      setSuppliers(s);
      setSpecs(sp);
    } catch (e) { toast(e.message, 'error'); }
    setLoading(false);
  }, [token]);

  useEffect(() => { load(); }, [load]);

  const typeOptions = [...new Set(packs.map(p => (p.myob_code || '').split('-')[0]).filter(Boolean))];

  const filtered = packs.filter(p => {
    if (filterSupplier && String(p.supplier_id) !== filterSupplier && p.supplier_name !== filterSupplier) return false;
    if (filterSpec && String(p.spec_id) !== filterSpec) return false;
    if (filterType && !(p.myob_code || '').startsWith(filterType)) return false;
    if (search) {
      const q = search.toLowerCase();
      if (!(p.qr_code || '').toLowerCase().includes(q) &&
          !(p.myob_code || '').toLowerCase().includes(q) &&
          !(p.supplier_name || '').toLowerCase().includes(q) &&
          !(p.spec_label || '').toLowerCase().includes(q)) return false;
    }
    return true;
  });

  if (loading) return <div className="flex justify-center py-12"><Spinner /></div>;

  return (
    <div style={{ padding: 16 }} className="space-y-4">
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10, alignItems: 'center' }}>
        <input className="hp-input" style={{ width: 200 }} placeholder="Search..." value={search} onChange={e => setSearch(e.target.value)} />
        <select className="hp-input" style={{ width: 160 }} value={filterSupplier} onChange={e => setFilterSupplier(e.target.value)}>
          <option value="">All Suppliers</option>
          {suppliers.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
        </select>
        <select className="hp-input" style={{ width: 160 }} value={filterSpec} onChange={e => setFilterSpec(e.target.value)}>
          <option value="">All Specs</option>
          {specs.map(s => <option key={s.id} value={s.id}>{s.width_mm}×{s.thickness_mm}×{s.length_mm}</option>)}
        </select>
        <select className="hp-input" style={{ width: 140 }} value={filterType} onChange={e => setFilterType(e.target.value)}>
          <option value="">All Types</option>
          {typeOptions.map(t => <option key={t} value={t}>{t}</option>)}
        </select>
        <button className="btn btn-secondary btn-sm" onClick={load}><Icon name="RefreshCw" size={16} /></button>
      </div>
      <div style={{ fontSize: 14, color: '#6b7280' }}>{filtered.length} pack{filtered.length !== 1 ? 's' : ''} in inventory</div>
      <div className="hp-card" style={{ padding: 0, overflow: 'hidden' }}>
        <div style={{ overflowX: 'auto' }}>
          <table className="hp-table">
            <thead>
              <tr>
                <th>Pack ID</th>
                <th>Spec</th>
                <th>MYOB Code</th>
                <th>Supplier</th>
                <th>Pieces</th>
                <th>Volume (m³)</th>
                <th>Received</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(p => (
                <tr key={p.id}>
                  <td style={{ fontFamily: 'monospace', fontWeight: 700, color: '#07324C' }}>{p.qr_code}</td>
                  <td style={{ fontFamily: 'monospace', fontSize: 14 }}>{p.spec_label || `${p.width_mm}×${p.thickness_mm}×${p.length_mm}`}</td>
                  <td>{p.myob_code || '—'}</td>
                  <td>{p.supplier_name || '—'}</td>
                  <td style={{ fontWeight: 700 }}>{p.pieces || '—'}</td>
                  <td style={{ fontFamily: 'monospace' }}>{fmtM3(p.volume_m3)}</td>
                  <td>{p.received_date?.split('T')[0] || '—'}</td>
                </tr>
              ))}
              {filtered.length === 0 && <tr><td colSpan={7}><Empty msg="No packs found" /></td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════
const App = () => {
  const [user, setUser] = useState(null);
  const [token, setToken] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);

  // ── PWA deep-link: pick up _token/_page from URL params ──
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const pwaToken = params.get('_token');
    const pwaPage = params.get('_page');
    const pwaApp = params.get('_app');
    if (pwaToken && pwaPage) {
      // Clean URL immediately
      window.history.replaceState({}, '', '/');
      // Validate the token
      fetch(API_BASE + '/auth/me', { headers: { 'Authorization': 'Bearer ' + pwaToken } })
        .then(r => r.ok ? r.json() : null)
        .then(userData => {
          if (userData && userData.id) {
            setUser(userData);
            setToken(pwaToken);
            const targetPage = pwaPage || 'dashboard';
            setPage(targetPage);
            if (['floor','chainsaw','receiving'].includes(targetPage) || pwaApp) {
              setSidebarCollapsed(true);
            }
          }
        })
        .catch(() => { /* token invalid, show login */ });
    }
  }, []);

  const handleLogin = (u, t) => {
    if (!u || !u.role) { console.error('Invalid user object:', u); return; }
    setUser(u);
    setToken(t);
    // Redirect floor workers to production, prod managers to station allocation
    if (u.role === 'floor_worker' || u.role === 'team_leader') {
      setPage('floor');
      setSidebarCollapsed(true);
    } else if (u.role === 'production_manager') {
      setPage('allocation');
    } else if (u.role === 'yardsman') {
      setPage('receiving');
      setSidebarCollapsed(true);
    } else if (u.role === 'chainsaw_operator') {
      setPage('chainsaw');
      setSidebarCollapsed(true);
    } else {
      setPage('dashboard');
    }
  };

  const handleLogout = () => { setUser(null); setToken(null); setPage('dashboard'); };

  const handleNav = (p) => {
    setPage(p);
    if (p === 'floor') setSidebarCollapsed(true);
    else setSidebarCollapsed(false);
  };

  if (!user) return <LoginPage onLogin={handleLogin} />;

  const renderPage = () => {
    switch(page) {
      case 'dashboard': return <Dashboard token={token} />;
      case 'office': return <OfficeDashboard token={token} />;
      case 'planning': return <PlanningBoard token={token} />;
      case 'allocation': return <ProductionManager token={token} />;
      case 'floor': {
        const isFloorWorker = user?.role === 'floor_worker';
        const canAccessWorkerTab = ['team_leader','production_manager','planner','executive'].includes(user?.role);
        if (isFloorWorker) return <FloorTablet token={token} user={user} />;
        if (canAccessWorkerTab) return <ProductionFloorWithWorkerTab token={token} user={user} />;
        return <ProductionFloorOverview token={token} />;
      }
      case 'qa': return <QADashboard token={token} />;
      case 'dispatch': return <DispatchDashboard token={token} />;
      case 'postproduction': return <PostProductionDashboard token={token} />;
      case 'productionlog': return <ProductionLogScreen token={token} />;
      case 'reporting': return <ReportingPage token={token} />;
      case 'admin': return <AdminPage token={token} />;
      case 'timber': return <TimberInventoryPage token={token} user={user} />;
      case 'receiving': return <ReceivingPage token={token} user={user} />;
      case 'chainsaw': return <ChainsawPage token={token} user={user} />;
      case 'ops': return <Dashboard token={token} isOps={true} />;
      default: return <Dashboard token={token} />;
    }
  };

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      <Sidebar page={page} onNav={handleNav} user={user} onLogout={handleLogout} collapsed={sidebarCollapsed} />
      <main style={{flex:1,overflow:'auto',background:'#F5F7FA'}}>
        {renderPage()}
      </main>
    </div>
  );
};

// Error boundary to catch rendering crashes
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null, info: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { this.setState({ info }); console.error('React crash:', error, info); }
  render() {
    if (this.state.error) {
      return React.createElement('div', { style: { padding: '40px', fontFamily: 'monospace' } },
        React.createElement('h1', { style: { color: '#ED1C24' } }, 'Application Error'),
        React.createElement('p', null, this.state.error.toString()),
        React.createElement('pre', { style: { background: '#f5f5f5', padding: '20px', overflow: 'auto', fontSize: '15px' } },
          this.state.info?.componentStack || 'No stack trace')
      );
    }
    return this.props.children;
  }
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
