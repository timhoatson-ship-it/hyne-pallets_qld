// ADMIN PAGE
// ═══════════════════════════════════════════════════════════════
const AdminPage = ({ token }) => {
  const [tab, setTab] = useState('users');
  const [users, setUsers] = useState([]);
  const [zones, setZones] = useState([]);
  const [accConfig, setAccConfig] = useState(null);
  const [emailConfig, setEmailConfig] = useState({});
  const [emailForm, setEmailForm] = useState({smtp_host:'',smtp_port:587,smtp_user:'',smtp_password:'',smtp_use_tls:1,from_name:'Hyne Pallets',from_email:'',is_active:0});
  const [emailTestTo, setEmailTestTo] = useState('');
  const [emailTesting, setEmailTesting] = useState(false);
  const [loading, setLoading] = useState(true);
  const [userModal, setUserModal] = useState(false);
  const [newUser, setNewUser] = useState({full_name:'',email:'',username:'',role:'floor_worker',pin:'',password:''});
  const [syncLog, setSyncLog] = useState([]);
  // Zone / station CRUD state
  const [zoneModal, setZoneModal] = useState(false);
  const [editingZone, setEditingZone] = useState(null); // null = new zone, object = editing
  const [zoneForm, setZoneForm] = useState({name:'',code:'',capacity_metric:'man_hours_per_station'});
  const [stationModal, setStationModal] = useState(null); // null | { zoneId, station: null|obj }
  const [stationForm, setStationForm] = useState({name:'',station_type:'station',code:''});
  const [deleteConfirm, setDeleteConfirm] = useState(null); // { type:'zone'|'station', id, name }
  const [capacityEdits, setCapacityEdits] = useState({}); // { [stationId]: value }
  // Costing / labour config
  const [labourConfig, setLabourConfig] = useState(null); // { default_rate, user_rates: [] }
  const [labourRateEdit, setLabourRateEdit] = useState(''); // string for the default rate field

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const [u, z, acc, sl, lc, ec] = await Promise.all([
        api('/users', {}, token),
        api('/zones', {}, token),
        api('/accounting/config', {}, token),
        api('/accounting/sync-log?limit=10', {}, token),
        api('/labour-config', {}, token).catch(() => ({ default_rate: 55, user_rates: [] })),
        api('/admin/email-config', {}, token).catch(() => ({})),
      ]);
      setUsers(u);
      setZones(z);
      setAccConfig(acc);
      setSyncLog(sl);
      setLabourConfig(lc);
      setLabourRateEdit(String(lc?.default_rate ?? 55));
      setEmailConfig(ec);
      setEmailForm({smtp_host:ec.smtp_host||'',smtp_port:ec.smtp_port||587,smtp_user:ec.smtp_user||'',smtp_password:'',smtp_use_tls:ec.smtp_use_tls??1,from_name:ec.from_name||'Hyne Pallets',from_email:ec.from_email||'',is_active:ec.is_active||0});
    } catch (e) { toast(e.message,'error'); }
    setLoading(false);
  }, [token]);

  useEffect(() => { load(); }, [load]);

  const deactivateUser = async (id) => {
    try {
      await api(`/users/${id}`, {method:'DELETE'}, token);
      toast('User deactivated','info');
      load();
    } catch (e) { toast(e.message,'error'); }
  };

  const createUser = async () => {
    try {
      await api('/users', {method:'POST',body:JSON.stringify(newUser)}, token);
      toast('User created','success');
      setUserModal(false);
      setNewUser({full_name:'',email:'',username:'',role:'floor_worker',pin:'',password:''});
      load();
    } catch (e) { toast(e.message,'error'); }
  };

  const syncNow = async () => {
    try {
      const r = await api('/accounting/sync', {method:'POST'}, token);
      toast(r.message||'Sync triggered','success');
      load();
    } catch (e) { toast(e.message,'error'); }
  };

  // Zone CRUD
  const openNewZone = () => {
    setEditingZone(null);
    setZoneForm({name:'',code:'',capacity_metric:'man_hours_per_station'});
    setZoneModal(true);
  };
  const openEditZone = (z) => {
    setEditingZone(z);
    setZoneForm({name:z.name, code:z.code||'', capacity_metric:z.capacity_metric||'man_hours_per_station'});
    setZoneModal(true);
  };
  const saveZone = async () => {
    try {
      if (editingZone) {
        await api(`/zones/${editingZone.id}`, {method:'PUT',body:JSON.stringify(zoneForm)}, token);
        toast('Zone updated','success');
      } else {
        await api('/zones', {method:'POST',body:JSON.stringify(zoneForm)}, token);
        toast('Zone created','success');
      }
      setZoneModal(false);
      load();
    } catch(e) { toast(e.message,'error'); }
  };
  const deleteZone = async (id) => {
    try {
      await api(`/zones/${id}`, {method:'DELETE'}, token);
      toast('Zone deleted','info');
      setDeleteConfirm(null);
      load();
    } catch(e) { toast(e.message,'error'); }
  };

  // Station CRUD
  const openNewStation = (zoneId) => {
    setStationModal({ zoneId, station: null });
    setStationForm({name:'',station_type:'station',code:''});
  };
  const openEditStation = (zoneId, s) => {
    setStationModal({ zoneId, station: s });
    setStationForm({name:s.name, station_type:s.station_type||'station', code:s.code||''});
  };
  const saveStation = async () => {
    try {
      if (stationModal.station) {
        await api(`/stations/${stationModal.station.id}`, {method:'PUT',body:JSON.stringify(stationForm)}, token);
        toast('Station updated','success');
      } else {
        await api(`/zones/${stationModal.zoneId}/stations`, {method:'POST',body:JSON.stringify(stationForm)}, token);
        toast('Station added','success');
      }
      setStationModal(null);
      load();
    } catch(e) { toast(e.message,'error'); }
  };
  const deleteStation = async (id) => {
    try {
      await api(`/stations/${id}`, {method:'DELETE'}, token);
      toast('Station deleted','info');
      setDeleteConfirm(null);
      load();
    } catch(e) { toast(e.message,'error'); }
  };

  // Station capacity inline
  const saveStationCapacity = async (stationId, value) => {
    try {
      await api('/station-capacity', {method:'PUT',body:JSON.stringify({station_id:stationId, max_units_per_day:parseInt(value)||0})}, token);
      toast('Capacity saved','success');
    } catch(e) { toast(e.message,'error'); }
  };

  // Labour config
  const saveDefaultRate = async () => {
    try {
      const rate = parseFloat(labourRateEdit);
      if (isNaN(rate) || rate < 0) { toast('Invalid rate','error'); return; }
      await api('/labour-config', {method:'PUT',body:JSON.stringify({rate_per_hour:rate})}, token);
      toast('Default labour rate saved','success');
      setLabourConfig(c => ({...c, default_rate: rate}));
    } catch(e) { toast(e.message,'error'); }
  };
  const saveUserRate = async (userId, rate) => {
    try {
      await api('/labour-config', {method:'PUT',body:JSON.stringify({rate_per_hour:parseFloat(rate)||0, user_id:userId})}, token);
      toast('User rate saved','success');
      const lc = await api('/labour-config', {}, token).catch(()=>labourConfig);
      setLabourConfig(lc);
    } catch(e) { toast(e.message,'error'); }
  };

  const ROLES = ['executive','admin','office','planner','floor_worker','team_leader','qa','dispatch','ops_manager'];
  const STATION_TYPES = ['machine','table','centre','station'];
  const CAPACITY_METRICS = ['units_per_machine','man_hours_per_table','man_hours_per_centre','man_hours_per_station'];

  return (
    <div className="p-6 space-y-4">
      <h1 className="text-2xl font-black text-[#07324C]">Admin</h1>

      <div className="tab-bar">
        {['users','zones','costing','email','accounting'].map(t => (
          <div key={t} className={`tab-item ${tab===t?'active':''}`} onClick={()=>setTab(t)} style={{textTransform:'capitalize'}}>{t}</div>
        ))}
      </div>

      {loading ? <div className="flex justify-center py-12"><Spinner /></div> : (
        <>
          {/* USERS */}
          {tab === 'users' && (
            <div className="hp-card">
              <div className="flex items-center justify-between mb-4">
                <h2 className="text-sm font-bold text-gray-500 uppercase tracking-wider">Users ({users.length})</h2>
                <button className="btn btn-primary btn-sm" onClick={()=>setUserModal(true)}>+ Add User</button>
              </div>
              <div className="table-scroll">
                <table className="hp-table">
                  <thead><tr><th>Name</th><th>Email / Username</th><th>Role</th><th>Zone</th><th>Active</th><th></th></tr></thead>
                  <tbody>
                    {users.map(u => (
                      <tr key={u.id}>
                        <td className="font-semibold">{u.full_name}</td>
                        <td className="text-xs text-gray-500">{u.email||u.username||'—'}</td>
                        <td><span className="badge badge-C" style={{textTransform:'capitalize'}}>{u.role?.replace('_',' ')}</span></td>
                        <td>{u.default_zone_id||'—'}</td>
                        <td>{u.is_active ? <span className="text-green-600 font-bold text-xs">Active</span> : <span className="text-gray-400 text-xs">Inactive</span>}</td>
                        <td>
                          {u.is_active && (
                            <button className="btn btn-danger btn-sm" onClick={()=>deactivateUser(u.id)}>Deactivate</button>
                          )}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              {userModal && (
                <div className="overlay" onClick={e=>e.target===e.currentTarget&&setUserModal(false)}>
                  <div className="modal">
                    <h3 className="font-black text-[#07324C] text-lg mb-4">Add New User</h3>
                    <div className="space-y-3">
                      {[['full_name','Full Name','text'],['email','Email','email'],['username','Username (floor)','text'],['password','Password','password'],['pin','PIN (floor)','text']].map(([field,label,type]) => (
                        <div key={field}>
                          <label className="hp-label">{label}</label>
                          <input type={type} className="hp-input" value={newUser[field]} onChange={e=>setNewUser(p=>({...p,[field]:e.target.value}))} />
                        </div>
                      ))}
                      <div>
                        <label className="hp-label">Role</label>
                        <select className="hp-input" value={newUser.role} onChange={e=>setNewUser(p=>({...p,role:e.target.value}))}>
                          {ROLES.map(r=><option key={r} value={r}>{r.replace('_',' ')}</option>)}
                        </select>
                      </div>
                    </div>
                    <div className="flex gap-3 mt-6">
                      <button className="btn btn-primary flex-1 justify-center" onClick={createUser}>Create User</button>
                      <button className="btn btn-secondary" onClick={()=>setUserModal(false)}>Cancel</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* ZONES */}
          {tab === 'zones' && (
            <div className="space-y-4">
              <div className="flex items-center justify-between">
                <h2 className="text-sm font-bold text-gray-500 uppercase tracking-wider">Zones &amp; Stations</h2>
                <button className="btn btn-primary btn-sm" onClick={openNewZone}>+ Add Zone</button>
              </div>

              {zones.length === 0 && <div className="hp-card"><Empty msg="No zones configured" /></div>}

              {zones.map(z => (
                <div key={z.id} className="hp-card">
                  {/* Zone header */}
                  <div className="flex items-start justify-between mb-3">
                    <div>
                      <h3 className="font-black text-[#07324C] text-lg">{z.name}</h3>
                      <div className="text-xs text-gray-400 uppercase tracking-wider mt-0.5">Code: {z.code||'—'} &middot; Metric: {z.capacity_metric}</div>
                    </div>
                    <div className="flex gap-2">
                      <button className="btn btn-secondary btn-sm" onClick={()=>openEditZone(z)}>Edit</button>
                      <button className="btn btn-danger btn-sm" onClick={()=>setDeleteConfirm({type:'zone',id:z.id,name:z.name})}>Delete</button>
                    </div>
                  </div>

                  {/* Stations table */}
                  <div className="mt-2">
                    <div className="flex items-center justify-between mb-2">
                      <div className="text-xs font-bold text-gray-400 uppercase tracking-wider">Stations ({z.stations?.length||0})</div>
                      <button className="btn btn-secondary btn-sm" style={{fontSize:15,padding:'2px 8px'}} onClick={()=>openNewStation(z.id)}>+ Add Station</button>
                    </div>
                    {(!z.stations || z.stations.length === 0) ? (
                      <div className="text-xs text-gray-400 italic py-1">No stations configured</div>
                    ) : (
                      <div className="table-scroll">
                        <table className="hp-table" style={{fontSize:15}}>
                          <thead>
                            <tr>
                              <th>Name</th>
                              <th>Type</th>
                              <th>Code</th>
                              <th>Capacity / Day</th>
                              <th></th>
                            </tr>
                          </thead>
                          <tbody>
                            {z.stations.map(s => (
                              <tr key={s.id}>
                                <td className="font-semibold">{s.name}</td>
                                <td><span className="badge badge-C" style={{textTransform:'capitalize'}}>{s.station_type}</span></td>
                                <td className="text-xs text-gray-500">{s.code||'—'}</td>
                                <td>
                                  <input
                                    type="number" min="0" step="1"
                                    className="hp-input"
                                    style={{width:80,padding:'2px 6px',fontSize:14}}
                                    defaultValue={s.max_units_per_day ?? ''}
                                    placeholder="—"
                                    onBlur={e => saveStationCapacity(s.id, e.target.value)}
                                  />
                                </td>
                                <td>
                                  <div className="flex gap-1">
                                    <button className="btn btn-secondary btn-sm" style={{fontSize:15,padding:'2px 7px'}} onClick={()=>openEditStation(z.id,s)}>Edit</button>
                                    <button className="btn btn-danger btn-sm" style={{fontSize:15,padding:'2px 7px'}} onClick={()=>setDeleteConfirm({type:'station',id:s.id,name:s.name})}>Del</button>
                                  </div>
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </div>
                </div>
              ))}

              {/* Zone modal */}
              {zoneModal && (
                <div className="overlay" onClick={e=>e.target===e.currentTarget&&setZoneModal(false)}>
                  <div className="modal" style={{maxWidth:420}}>
                    <h3 className="font-black text-[#07324C] text-lg mb-4">{editingZone ? 'Edit Zone' : 'New Zone'}</h3>
                    <div className="space-y-3">
                      <div>
                        <label className="hp-label">Zone Name</label>
                        <input className="hp-input" value={zoneForm.name} onChange={e=>setZoneForm(p=>({...p,name:e.target.value}))} placeholder="e.g. Assembly" />
                      </div>
                      <div>
                        <label className="hp-label">Code</label>
                        <input className="hp-input" value={zoneForm.code} onChange={e=>setZoneForm(p=>({...p,code:e.target.value}))} placeholder="e.g. ASM" />
                      </div>
                      <div>
                        <label className="hp-label">Capacity Metric</label>
                        <select className="hp-input" value={zoneForm.capacity_metric} onChange={e=>setZoneForm(p=>({...p,capacity_metric:e.target.value}))}>
                          {CAPACITY_METRICS.map(m=><option key={m} value={m}>{m.replace(/_/g,' ')}</option>)}
                        </select>
                      </div>
                    </div>
                    <div className="flex gap-3 mt-6">
                      <button className="btn btn-primary flex-1 justify-center" onClick={saveZone}>{editingZone ? 'Save Changes' : 'Create Zone'}</button>
                      <button className="btn btn-secondary" onClick={()=>setZoneModal(false)}>Cancel</button>
                    </div>
                  </div>
                </div>
              )}

              {/* Station modal */}
              {stationModal && (
                <div className="overlay" onClick={e=>e.target===e.currentTarget&&setStationModal(null)}>
                  <div className="modal" style={{maxWidth:400}}>
                    <h3 className="font-black text-[#07324C] text-lg mb-4">{stationModal.station ? 'Edit Station' : 'Add Station'}</h3>
                    <div className="space-y-3">
                      <div>
                        <label className="hp-label">Station Name</label>
                        <input className="hp-input" value={stationForm.name} onChange={e=>setStationForm(p=>({...p,name:e.target.value}))} placeholder="e.g. Table 1" />
                      </div>
                      <div>
                        <label className="hp-label">Station Type</label>
                        <select className="hp-input" value={stationForm.station_type} onChange={e=>setStationForm(p=>({...p,station_type:e.target.value}))}>
                          {STATION_TYPES.map(t=><option key={t} value={t}>{t}</option>)}

                      load();

                      if (!emailTestTo) { toast('Enter a recipient email','error'); return; }

                        const res = await api('/admin/email-test', {method:'POST',body:JSON.stringify({to_email:emailTestTo})}, token);
                        toast(res.message || 'Test email sent','success');
                      } catch(e) { toast(e.message,'error'); }
                      setEmailTesting(false);
                    }}>{emailTesting ? 'Sending...' : 'Send Test'}</button>
                  </div>
                  {emailConfig.test_email_sent_at && (
                    <p className="text-xs text-gray-400 mt-2">Last test: {new Date(emailConfig.test_email_sent_at).toLocaleString()}</p>

              </div>
            </div>
          )}

          {/* ACCOUNTING */}
          {tab === 'accounting' && (
            <div className="hp-card">
              <h2 className="text-sm font-bold text-gray-500 uppercase tracking-wider mb-4">Accounting Integration</h2>
              {accConfig && (
                <div className="space-y-3 mb-6">
                  <div className="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                    <div>
                      <div className="font-bold text-[#07324C]">Provider: {accConfig.provider || 'Mock'}</div>
                      <div className="text-xs text-gray-500 mt-1">Last sync: {accConfig.last_sync_at ? new Date(accConfig.last_sync_at).toLocaleString() : 'Never'}</div>

                    <div className={`px-3 py-1 rounded-full text-xs font-bold ${accConfig.is_connected ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}`}>

                    </div>
                  </div>
                  <button className="btn btn-primary btn-lg w-full justify-center" onClick={syncNow}>
                    <Icon name="RefreshCw" size={16}/> Sync Now
                  </button>
                </div>
              )}
              <h3 className="text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">Sync History</h3>
              {syncLog.length === 0 ? <Empty msg="No sync history" /> : (
                <div className="table-scroll">
                  <table className="hp-table">
                    <thead><tr><th>Direction</th><th>Entity</th><th>Status</th><th>Details</th><th>Time</th></tr></thead>
                    <tbody>
                      {syncLog.map(l => (
                        <tr key={l.id}>
                          <td className="capitalize">{l.direction}</td>
                          <td>{l.entity_type}</td>
                          <td><span className={`font-bold text-xs ${l.status==='success'?'text-green-600':'text-red-600'}`}>{l.status}</span></td>
                          <td className="text-xs text-gray-500">{l.details}</td>
                          <td className="text-xs text-gray-500">{l.synced_at?.split('T')[0]}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          )}
        </>
      )}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// TIMBER INVENTORY — SHARED HELPERS
// ═══════════════════════════════════════════════════════════════
const isExec = (user) => user && ['executive','admin'].includes(user.role);
const isFinance = (user) => user && ['executive','admin','office'].includes(user.role);
const canSeeTimberCost = (user) => isFinance(user);

const fmtCbm = (n) => typeof n === 'number' ? n.toFixed(3) + ' m³' : '—';
const fmtM3 = (n) => typeof n === 'number' ? n.toFixed(3) : '—';
const fmtCurrency2 = (n) => typeof n === 'number' ? '$' + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '—';
const ageDays = (dateStr) => {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  const now = new Date();
  return Math.floor((now - d) / 86400000);
};

const TimberStatusBadge = ({ status }) => {
  const cfg = {
    pending:   { bg: '#FEF3C7', color: '#92400E', label: 'Pending' },
    receiving: { bg: '#DBEAFE', color: '#1D4ED8', label: 'Receiving' },
    complete:  { bg: '#DCFCE7', color: '#166534', label: 'Complete' },
    consumed:  { bg: '#FEE2E2', color: '#991B1B', label: 'Consumed' },
    inventory: { bg: '#DCFCE7', color: '#166534', label: 'In Stock' },
    partial:   { bg: '#FEF3C7', color: '#92400E', label: 'Partial' },
    approved:  { bg: '#DCFCE7', color: '#166534', label: 'Approved' },
    rejected:  { bg: '#FEE2E2', color: '#991B1B', label: 'Rejected' },
  };
  const c = cfg[status] || { bg: '#e5e7eb', color: '#6b7280', label: status };
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', padding: '2px 10px', borderRadius: 999,
      fontSize: 13, fontWeight: 700, background: c.bg, color: c.color, letterSpacing: '0.04em' }}>
      {c.label}
    </span>
  );
};

// Simple QR input widget (manual + camera hint)
const QRInput = ({ value, onChange, onSubmit, placeholder = 'e.g. EP-00042', autoFocus = false }) => {
  const inputRef = useRef(null);
  useEffect(() => { if (autoFocus && inputRef.current) inputRef.current.focus(); }, [autoFocus]);
  return (
    <div style={{ display: 'flex', gap: 8 }}>
      <input
        ref={inputRef}
        className="hp-input"
        style={{ fontFamily: 'monospace', fontSize: 18, letterSpacing: '0.08em' }}
        value={value}
        onChange={e => onChange(e.target.value.toUpperCase())}
        onKeyDown={e => { if (e.key === 'Enter' && value.trim()) onSubmit(value.trim()); }}
        placeholder={placeholder}
      />
      <button
        className="btn btn-secondary"
        title="Camera QR scanning requires HTTPS deployment — use text entry"
        onClick={() => toast('Camera QR scanning requires HTTPS deployment — type pack ID above', 'info')}
        style={{ padding: '8px 14px', flexShrink: 0 }}
      >
        <Icon name="Camera" size={20} />
      </button>
      <button
        className="btn btn-primary"
        onClick={() => { if (value.trim()) onSubmit(value.trim()); }}
        style={{ padding: '8px 18px', flexShrink: 0 }}
        disabled={!value.trim()}
      >
        Go
      </button>
    </div>
  );
};

// TIMBER ADMIN SUB-SECTION
// ═══════════════════════════════════════════════════════════════
const TimberAdminSection = ({ token }) => {
  const [tab, setTab] = useState('suppliers');
  const [suppliers, setSuppliers] = useState([]);
  const [specs, setSpecs] = useState([]);
  const [grades, setGrades] = useState([]);
  const [pendingSuppliers, setPendingSuppliers] = useState([]);
  const [alerts, setAlerts] = useState([]);
  const [config, setConfig] = useState({ fifo_threshold_days: 30, qr_prefix: 'EP', cost_visibility_roles: 'executive,admin,office' });
  const [loading, setLoading] = useState(false);
  const [supplierForm, setSupplierForm] = useState({ name: '', code: '', contact_name: '', contact_email: '', contact_phone: '', notes: '' });
  const [specForm, setSpecForm] = useState({ width_mm: '', thickness_mm: '', length_mm: '', myob_code: '', grade_code: '', description: '' });
  const [gradeForm, setGradeForm] = useState({ code: '', name: '' });
  const [editingSupplier, setEditingSupplier] = useState(null);
  const [editingSpec, setEditingSpec] = useState(null);
  const [alertForm, setAlertForm] = useState({ spec_id: '', threshold_packs: 10, email_recipients: '' });
  const [saving, setSaving] = useState(false);
  const [undoLog, setUndoLog] = useState([]);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const [s, sp, g, pa, al, ul] = await Promise.all([
        api('/timber/suppliers', {}, token).catch(() => []),
        api('/timber/specs', {}, token).catch(() => []),
        api('/timber/grade-codes', {}, token).catch(() => []),
        api('/timber/suppliers?status=pending', {}, token).catch(() => []),
        api('/timber/stock-alerts', {}, token).catch(() => []),
        api('/timber/undo-log', {}, token).catch(() => []),
      ]);
      setSuppliers(s);
      setSpecs(sp);
      setGrades(g);
      setPendingSuppliers(Array.isArray(pa) ? pa.filter(x => x.status === 'pending') : []);
      setAlerts(al);
      setUndoLog(ul);
    } catch (e) { toast(e.message, 'error'); }
    setLoading(false);
  }, [token]);

  useEffect(() => { load(); }, [load]);

  const saveSupplier = async () => {
    setSaving(true);
    try {
      if (editingSupplier) {
        await api(`/timber/suppliers/${editingSupplier.id}`, { method: 'PUT', body: JSON.stringify(supplierForm) }, token);
        toast('Supplier updated', 'success');
      } else {
        await api('/timber/suppliers', { method: 'POST', body: JSON.stringify(supplierForm) }, token);
        toast('Supplier created', 'success');
      }
      setSupplierForm({ name: '', code: '', contact_name: '', contact_email: '', contact_phone: '', notes: '' });
      setEditingSupplier(null);
      load();
    } catch (e) { toast(e.message, 'error'); }
    setSaving(false);
  };

  const approveSupplier = async (id, approve) => {
    try {
      await api(`/timber/suppliers/${id}/${approve ? 'approve' : 'reject'}`, { method: 'POST' }, token);
      toast(approve ? 'Supplier approved' : 'Supplier rejected', approve ? 'success' : 'info');
      load();
    } catch (e) { toast(e.message, 'error'); }
  };

  const saveSpec = async () => {
    setSaving(true);
    try {
      if (editingSpec) {
        await api(`/timber/specs/${editingSpec.id}`, { method: 'PUT', body: JSON.stringify(specForm) }, token);
        toast('Spec updated', 'success');
      } else {
        await api('/timber/specs', { method: 'POST', body: JSON.stringify(specForm) }, token);
        toast('Spec created', 'success');
      }
      setSpecForm({ width_mm: '', thickness_mm: '', length_mm: '', myob_code: '', grade_code: '', description: '' });
      setEditingSpec(null);
      load();
    } catch (e) { toast(e.message, 'error'); }
    setSaving(false);
  };

  const saveGrade = async () => {
    setSaving(true);
    try {
      await api('/timber/grade-codes', { method: 'POST', body: JSON.stringify(gradeForm) }, token);
      toast('Grade code saved', 'success');
      setGradeForm({ code: '', name: '' });
      load();
    } catch (e) { toast(e.message, 'error'); }
    setSaving(false);
  };

  const saveAlert = async () => {
    setSaving(true);
    try {
      await api('/timber/stock-alerts', { method: 'POST', body: JSON.stringify(alertForm) }, token);
      toast('Alert saved', 'success');
      load();
    } catch (e) { toast(e.message, 'error'); }
    setSaving(false);
  };

  const saveConfig = async () => {
    setSaving(true);
    try {
      await api('/timber/config', { method: 'PUT', body: JSON.stringify(config) }, token);
      toast('Config saved', 'success');
    } catch (e) { toast(e.message, 'error'); }
    setSaving(false);
  };

  const deleteTestData = async () => {
    if (!window.confirm('Delete ALL test timber data? This cannot be undone.')) return;
    try {
      await api('/timber/test-data', { method: 'DELETE' }, token);
      toast('Test data deleted', 'info');
      load();
    } catch (e) { toast(e.message, 'error'); }
  };

  if (loading) return <div className="flex justify-center py-8"><Spinner /></div>;

  return (
    <div>
      <div className="tab-bar" style={{ marginBottom: 20 }}>
        {['suppliers','specs','grades','alerts','config','undo-log'].map(t => (
          <div key={t} className={`tab-item ${tab === t ? 'active' : ''}`} onClick={() => setTab(t)}
            style={{ textTransform: 'capitalize' }}>{t.replace('-', ' ')}</div>
        ))}
      </div>

      {/* SUPPLIERS */}
      {tab === 'suppliers' && (
        <div className="space-y-4">
          {pendingSuppliers.length > 0 && (
            <div className="hp-card" style={{ borderLeft: '4px solid #F59E0B' }}>
              <h3 style={{ fontWeight: 700, color: '#92400E', marginBottom: 12 }}>Pending Supplier Approvals ({pendingSuppliers.length})</h3>
              {pendingSuppliers.map(s => (
                <div key={s.id} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 0', borderBottom: '1px solid #e2e8f0' }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700 }}>{s.name}</div>
                    <div style={{ fontSize: 14, color: '#6b7280' }}>Code: {s.code} — Requested by: {s.requested_by || '?'}</div>
                  </div>
                  <button className="btn btn-success btn-sm" onClick={() => approveSupplier(s.id, true)}>Approve</button>
                  <button className="btn btn-danger btn-sm" onClick={() => approveSupplier(s.id, false)}>Reject</button>
                </div>
              ))}
            </div>
          )}

          <div className="hp-card">
            <h3 style={{ fontWeight: 700, color: '#07324C', marginBottom: 16 }}>
              {editingSupplier ? 'Edit Supplier' : 'Add Supplier'}
            </h3>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
              <div><label className="hp-label">Name</label>
                <input className="hp-input" value={supplierForm.name} onChange={e => setSupplierForm(f => ({ ...f, name: e.target.value }))} /></div>
              <div><label className="hp-label">Code</label>
                <input className="hp-input" value={supplierForm.code} onChange={e => setSupplierForm(f => ({ ...f, code: e.target.value }))} /></div>
              <div><label className="hp-label">Contact Name</label>
                <input className="hp-input" value={supplierForm.contact_name} onChange={e => setSupplierForm(f => ({ ...f, contact_name: e.target.value }))} /></div>
              <div><label className="hp-label">Contact Email</label>
                <input className="hp-input" type="email" value={supplierForm.contact_email} onChange={e => setSupplierForm(f => ({ ...f, contact_email: e.target.value }))} /></div>
              <div><label className="hp-label">Phone</label>
                <input className="hp-input" value={supplierForm.contact_phone} onChange={e => setSupplierForm(f => ({ ...f, contact_phone: e.target.value }))} /></div>
              <div><label className="hp-label">Notes</label>
                <input className="hp-input" value={supplierForm.notes} onChange={e => setSupplierForm(f => ({ ...f, notes: e.target.value }))} /></div>
            </div>
            <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
              <button className="btn btn-primary" onClick={saveSupplier} disabled={saving}>{saving ? <Spinner /> : editingSupplier ? 'Update' : 'Add Supplier'}</button>
              {editingSupplier && <button className="btn btn-secondary" onClick={() => { setEditingSupplier(null); setSupplierForm({ name: '', code: '', contact_name: '', contact_email: '', contact_phone: '', notes: '' }); }}>Cancel</button>}
            </div>
          </div>

          <div className="hp-card">

                <p style={{ fontSize: 13, color: '#6b7280', marginTop: 4 }}>Packs older than this will be flagged amber in inventory view</p>
              </div>
              <div>
                <label className="hp-label">QR Code Prefix</label>
                <input className="hp-input" value={config.qr_prefix} onChange={e => setConfig(c => ({ ...c, qr_prefix: e.target.value.toUpperCase() }))} />
                <p style={{ fontSize: 13, color: '#6b7280', marginTop: 4 }}>Pack IDs will be prefixed with this (e.g. EP-00001)</p>
              </div>
              <div style={{ gridColumn: '1 / -1' }}>
                <label className="hp-label">Cost Visibility Roles (comma-separated)</label>
                <input className="hp-input" value={config.cost_visibility_roles} onChange={e => setConfig(c => ({ ...c, cost_visibility_roles: e.target.value }))} />
                <p style={{ fontSize: 13, color: '#6b7280', marginTop: 4 }}>Roles that can see cost data. e.g. executive,admin,office</p>

            <button className="btn btn-primary" style={{ marginTop: 16 }} onClick={saveConfig} disabled={saving}>{saving ? <Spinner /> : 'Save Config'}</button>

// ── Tab 1: Full Inventory ──────────────────────────────────────
const TimberInventoryTab = ({ token, user }) => {
  const canCost = canSeeTimberCost(user);
  const [packs, setPacks] = useState([]);
  const [suppliers, setSuppliers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [unit, setUnit] = useState('m3'); // m3 | pieces | lineal
  const [filterSupplier, setFilterSupplier] = useState('');
  const [filterType, setFilterType] = useState('');
  const [search, setSearch] = useState('');
  const [sortKey, setSortKey] = useState('received_date');
  const [sortDir, setSortDir] = useState('asc');
  const [fifoThreshold, setFifoThreshold] = useState(30);
  const [summary, setSummary] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const [p, s, sum, cfg] = await Promise.all([
        api('/timber/packs?status=inventory', {}, token).catch(() => []),
        api('/timber/suppliers', {}, token).catch(() => []),
        api('/timber/summary', {}, token).catch(() => null),
        api('/timber/config', {}, token).catch(() => ({})),
      ]);
      setPacks(Array.isArray(p) ? p : (p.packs || []));
      setSuppliers(s);
      setSummary(sum);
      if (cfg.fifo_threshold_days) setFifoThreshold(cfg.fifo_threshold_days);
    } catch (e) { toast(e.message, 'error'); }
    setLoading(false);
  }, [token]);

  useEffect(() => { load(); }, [load]);

  const toggleSort = (key) => {
    if (sortKey === key) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortKey(key); setSortDir('asc'); }
  };

  const typeOptions = [...new Set(packs.map(p => (p.myob_code || '').split('-')[0]).filter(Boolean))];

  const filtered = packs.filter(p => {
    if (filterSupplier && p.supplier_id !== parseInt(filterSupplier) && p.supplier_name !== filterSupplier) return false;
    if (filterType && !(p.myob_code || '').startsWith(filterType)) return false;
    if (search) {
      const q = search.toLowerCase();
      if (!(p.qr_code || '').toLowerCase().includes(q) &&
          !(p.myob_code || '').toLowerCase().includes(q) &&
          !(p.supplier_name || '').toLowerCase().includes(q) &&
          !(p.spec_label || '').toLowerCase().includes(q)) return false;
    }
    return true;
  });

  const sorted = [...filtered].sort((a, b) => {
    let va = a[sortKey], vb = b[sortKey];
    if (sortKey === 'age') { va = ageDays(a.received_date); vb = ageDays(b.received_date); }
    if (va == null) return 1; if (vb == null) return -1;
    const r = va < vb ? -1 : va > vb ? 1 : 0;
    return sortDir === 'asc' ? r : -r;
  });

  const getQty = (p) => {
    if (unit === 'pieces') return (p.pieces || 0).toLocaleString() + ' pcs';
    if (unit === 'lineal') return ((p.lineal_metres || 0).toFixed(1)) + ' lm';
    return fmtM3(p.volume_m3);
  };

  const SortTh = ({ col, label }) => (
    <th onClick={() => toggleSort(col)} style={{ cursor: 'pointer', userSelect: 'none', whiteSpace: 'nowrap' }}>
      {label} {sortKey === col ? (sortDir === 'asc' ? '↑' : '↓') : <span style={{ opacity: 0.3 }}>↕</span>}
    </th>
  );

  if (loading) return <div className="flex justify-center py-12"><Spinner /></div>;

  return (
    <div className="space-y-4">
      {/* Summary cards */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', gap: 16 }}>
        <div className="stat-card">
          <div style={{ fontSize: 13, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.06em' }}>Total Packs</div>
          <div style={{ fontSize: 32, fontWeight: 900, color: '#07324C', marginTop: 4 }}>{summary?.total_packs ?? filtered.length}</div>
          <div style={{ fontSize: 13, color: '#6b7280' }}>in stock</div>
        </div>
        <div className="stat-card">
          <div style={{ fontSize: 13, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.06em' }}>Total Volume</div>
          <div style={{ fontSize: 26, fontWeight: 900, color: '#07324C', marginTop: 4 }}>{fmtM3(summary?.total_m3 ?? packs.reduce((s, p) => s + (p.volume_m3 || 0), 0))}</div>
          <div style={{ fontSize: 13, color: '#6b7280' }}>m³</div>
        </div>
        {canCost && (
          <div className="stat-card" style={{ borderLeftColor: '#ED1C24' }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.06em' }}>Total Value</div>
            <div style={{ fontSize: 24, fontWeight: 900, color: '#ED1C24', marginTop: 4 }}>{fmtCurrency2(summary?.total_value)}</div>
            <div style={{ fontSize: 13, color: '#6b7280' }}>at cost</div>
          </div>
        )}
        <div className="stat-card" style={{ borderLeftColor: '#F59E0B' }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.06em' }}>FIFO Flags</div>
          <div style={{ fontSize: 32, fontWeight: 900, color: '#D97706', marginTop: 4 }}>
            {packs.filter(p => (ageDays(p.received_date) || 0) > fifoThreshold).length}
          </div>
          <div style={{ fontSize: 13, color: '#6b7280' }}>packs &gt;{fifoThreshold}d old</div>
        </div>
      </div>

      {/* Toolbar */}
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10, alignItems: 'center' }}>
        <input className="hp-input" style={{ width: 200 }} placeholder="Search pack, spec, supplier..." value={search} onChange={e => setSearch(e.target.value)} />
        <select className="hp-input" style={{ width: 160 }} value={filterSupplier} onChange={e => setFilterSupplier(e.target.value)}>
          <option value="">All Suppliers</option>
          {suppliers.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
        </select>
        <select className="hp-input" style={{ width: 160 }} value={filterType} onChange={e => setFilterType(e.target.value)}>
          <option value="">All Types</option>
          {typeOptions.map(t => <option key={t} value={t}>{t}</option>)}
        </select>
        <div style={{ display: 'flex', gap: 0, marginLeft: 'auto', background: '#e5e7eb', borderRadius: 7, overflow: 'hidden' }}>
          {[['m3', 'm³'], ['pieces', 'Pcs'], ['lineal', 'Lineal m']].map(([v, l]) => (
            <button key={v}
              style={{ padding: '7px 14px', fontSize: 15, fontWeight: 700, border: 'none', cursor: 'pointer', background: unit === v ? '#07324C' : 'transparent', color: unit === v ? '#fff' : '#374151', transition: 'all 0.15s' }}
              onClick={() => setUnit(v)}>{l}</button>
          ))}
        </div>
        <button className="btn btn-secondary btn-sm" onClick={load}><Icon name="RefreshCw" size={16} /></button>
      </div>

      {/* Table */}
      <div className="hp-card" style={{ padding: 0, overflow: 'hidden' }}>
        <div style={{ overflowX: 'auto' }}>
          <table className="hp-table">
            <thead>
              <tr>
                <SortTh col="qr_code" label="Pack ID / QR" />
                <SortTh col="spec_label" label="Spec (W×T×L)" />
                <th>MYOB Code</th>
                <SortTh col="supplier_name" label="Supplier" />
                <th>Type</th>
                <SortTh col="received_date" label="Received" />
                <SortTh col="age" label="Age" />
                <SortTh col="volume_m3" label={unit === 'pieces' ? 'Pieces' : unit === 'lineal' ? 'Lineal m' : 'Volume'} />
                {canCost && <SortTh col="cost_per_m3" label="Cost/m³" />}
                {canCost && <SortTh col="total_cost" label="Total Cost" />}
              </tr>
            </thead>
            <tbody>
              {sorted.map(p => {
                const age = ageDays(p.received_date) || 0;
                const isFifo = age > fifoThreshold;
                return (
                  <tr key={p.id} style={isFifo ? { background: '#FFFBEB' } : {}}>
                    <td>
                      <span style={{ fontFamily: 'monospace', fontWeight: 700, color: '#07324C' }}>{p.qr_code}</span>
                      {isFifo && <span style={{ marginLeft: 6, fontSize: 12, background: '#FEF3C7', color: '#92400E', padding: '1px 6px', borderRadius: 4, fontWeight: 700 }}>FIFO</span>}
                    </td>
                    <td style={{ fontFamily: 'monospace' }}>{p.spec_label || `${p.width_mm}×${p.thickness_mm}×${p.length_mm}`}</td>
                    <td>{p.myob_code || '—'}</td>
                    <td>{p.supplier_name || '—'}</td>
                    <td style={{ fontFamily: 'monospace', fontSize: 13 }}>{(p.myob_code || '').split('-')[0] || '—'}</td>
                    <td>{p.received_date?.split('T')[0] || '—'}</td>
                    <td>
                      <span style={{ fontWeight: age > fifoThreshold ? 700 : 400, color: age > fifoThreshold ? '#D97706' : 'inherit' }}>
                        {age}d
                      </span>
                    </td>
                    <td style={{ fontFamily: 'monospace' }}>{getQty(p)}</td>
                    {canCost && <td style={{ fontFamily: 'monospace' }}>{fmtCurrency2(p.cost_per_m3)}</td>}
                    {canCost && <td style={{ fontFamily: 'monospace', fontWeight: 700 }}>{fmtCurrency2(p.total_cost)}</td>}
                  </tr>
                );
              })}
              {sorted.length === 0 && (
                <tr><td colSpan={canCost ? 10 : 8}><Empty msg="No packs in inventory" /></td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
      <div style={{ fontSize: 14, color: '#6b7280' }}>{sorted.length} pack{sorted.length !== 1 ? 's' : ''} shown</div>
    </div>
  );
};

// ── Tab 2: Pipeline / Delivery Log ────────────────────────────
const TimberPipelineTab = ({ token, user }) => {
  const [deliveries, setDeliveries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [expanded, setExpanded] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const d = await api('/timber/deliveries', {}, token).catch(() => []);

  if (loading) return <div className="flex justify-center py-12"><Spinner /></div>;

      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>

          <div style={{ display: 'flex', alignItems: 'center', gap: 16, padding: '14px 20px', cursor: 'pointer' }}
            onClick={() => setExpanded(expanded === d.id ? null : d.id)}>

              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <span style={{ fontWeight: 700, color: '#07324C', fontSize: 17 }}>{d.supplier_name || 'Unknown Supplier'}</span>

              <div style={{ fontSize: 14, color: '#6b7280', marginTop: 2 }}>
                Docket: <span style={{ fontFamily: 'monospace', fontWeight: 600 }}>{d.docket_number || '—'}</span>

              </div>
            </div>
            {d.items_summary && (
              <div style={{ fontSize: 14, color: '#374151' }}>{d.items_summary}</div>

            <div style={{ borderTop: '1px solid #e2e8f0', padding: '14px 20px', background: '#F9FAFB' }}>
              <DeliveryItemsDetail deliveryId={d.id} token={token} />

        </div>
      ))}

  );
};

const DeliveryItemsDetail = ({ deliveryId, token }) => {

  useEffect(() => {
    api(`/timber/deliveries/${deliveryId}/items`, {}, token)

              <td>{item.description || '—'}</td>

};

// ── Tab 3: Finance / CSV Import ────────────────────────────────
const TimberFinanceTab = ({ token, user }) => {
  const [imports, setImports] = useState([]);
  const [valuation, setValuation] = useState([]);
  const [loading, setLoading] = useState(true);
  const [uploading, setUploading] = useState(false);
  const fileRef = useRef(null);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const [im, val] = await Promise.all([
        api('/timber/cost-imports', {}, token).catch(() => []),
        api('/timber/valuation', {}, token).catch(() => []),
      ]);
      setImports(Array.isArray(im) ? im : []);
      setValuation(Array.isArray(val) ? val : []);
    } catch (e) { toast(e.message, 'error'); }
    setLoading(false);
  }, [token]);

  useEffect(() => { load(); }, [load]);

  const handleUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setUploading(true);
    try {
      const formData = new FormData();
      formData.append('file', file);
      const res = await fetch('/api/timber/cost-imports', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token },
        body: formData,
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Upload failed');
      toast(`Imported ${data.matched} of ${data.total} rows`, 'success');
      load();
    } catch (err) { toast(err.message, 'error'); }
    setUploading(false);
    if (fileRef.current) fileRef.current.value = '';
  };

  const exportMYOB = async () => {
    try {
      const res = await fetch('/api/timber/valuation/export-myob', { headers: { 'Authorization': 'Bearer ' + token } });
      if (!res.ok) { toast('Export failed', 'error'); return; }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `timber-valuation-${localDateStr()}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (e) { toast(e.message, 'error'); }
  };

  if (loading) return <div className="flex justify-center py-12"><Spinner /></div>;

  const totalValue = valuation.reduce((s, v) => s + (v.total_value || 0), 0);

  return (
    <div className="space-y-4">
      {/* CSV Import */}
      <div className="hp-card">
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
          <h2 style={{ fontWeight: 700, color: '#07324C', fontSize: 18 }}>Cost Import (CSV)</h2>
          <div style={{ display: 'flex', gap: 10 }}>
            <input ref={fileRef} type="file" accept=".csv" style={{ display: 'none' }} onChange={handleUpload} />
            <button className="btn btn-primary" onClick={() => fileRef.current?.click()} disabled={uploading}>
              <Icon name="Upload" size={16} /> {uploading ? 'Uploading...' : 'Upload CSV'}
            </button>
          </div>
        </div>
        <table className="hp-table">
          <thead><tr><th>Date</th><th>File</th><th>Period</th><th>Status</th><th>Rows Matched</th></tr></thead>
          <tbody>
            {imports.map(im => (
              <tr key={im.id}>
                <td>{im.created_at?.split('T')[0]}</td>
                <td style={{ fontFamily: 'monospace', fontSize: 14 }}>{im.filename}</td>
                <td>{im.period || '—'}</td>
                <td><TimberStatusBadge status={im.status} /></td>
                <td>{im.matched_rows} / {im.total_rows}</td>
              </tr>
            ))}
            {imports.length === 0 && <tr><td colSpan={5}><Empty msg="No imports yet" /></td></tr>}
          </tbody>
        </table>
      </div>

      {/* Valuation */}
      <div className="hp-card">
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
          <h2 style={{ fontWeight: 700, color: '#07324C', fontSize: 18 }}>
            Inventory Valuation — Total: {fmtCurrency2(totalValue)}
          </h2>
          <button className="btn btn-outline btn-sm" onClick={exportMYOB}>
            <Icon name="Download" size={16} /> Export MYOB CSV
          </button>
        </div>
        <table className="hp-table">
          <thead><tr><th>MYOB Account Code</th><th>Spec</th><th>Packs</th><th>Volume (m³)</th><th>Total Value</th></tr></thead>
          <tbody>
            {valuation.map((v, i) => (
              <tr key={i}>
                <td style={{ fontFamily: 'monospace', fontWeight: 700 }}>{v.myob_code || '—'}</td>
                <td>{v.spec_label || '—'}</td>
                <td>{v.pack_count}</td>
                <td style={{ fontFamily: 'monospace' }}>{fmtM3(v.total_m3)}</td>
                <td style={{ fontFamily: 'monospace', fontWeight: 700, color: '#07324C' }}>{fmtCurrency2(v.total_value)}</td>
              </tr>
            ))}
            {valuation.length === 0 && <tr><td colSpan={5}><Empty msg="No valuation data" /></td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
};

// RECEIVING PAGE
// ═══════════════════════════════════════════════════════════════
const ReceivingPage = ({ token, user }) => {
  const [subPage, setSubPage] = useState('queue'); // queue | active | consume
  const [selectedDelivery, setSelectedDelivery] = useState(null);
  const [deliveries, setDeliveries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showNewDelivery, setShowNewDelivery] = useState(false);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const d = await api('/timber/deliveries?status=pending,receiving', {}, token).catch(() => []);
      setDeliveries(Array.isArray(d) ? d : (d.deliveries || []));
    } catch (e) { toast(e.message, 'error'); }
    setLoading(false);
  }, [token]);

  useEffect(() => { load(); }, [load]);

  const openDelivery = (d) => {
    setSelectedDelivery(d);
    setSubPage('active');
  };

  return (
    <div className="p-4" style={{ maxWidth: 1100, margin: '0 auto' }}>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}>
        {subPage !== 'queue' && (
          <button className="btn btn-secondary btn-sm" onClick={() => { setSubPage('queue'); setSelectedDelivery(null); }}>
            <Icon name="ArrowLeft" size={16} /> Back
          </button>
        )}
        <h1 className="text-2xl font-black text-[#07324C]">
          {subPage === 'queue' ? 'Receiving' : subPage === 'active' ? `Delivery: ${selectedDelivery?.docket_number || 'Active'}` : 'Consume Pack'}
        </h1>
        {subPage === 'queue' && (
          <div style={{ marginLeft: 'auto', display: 'flex', gap: 10 }}>
            <button className="btn btn-secondary btn-sm" onClick={() => setSubPage('consume')}>
              <Icon name="ScanLine" size={16} /> Consume Pack
            </button>
            <button className="btn btn-primary" onClick={() => setShowNewDelivery(true)} style={{ fontSize: 17 }}>
              <Icon name="PackagePlus" size={18} /> New Delivery
            </button>
          </div>
        )}
      </div>

      {/* Sub-pages */}
      {subPage === 'queue' && (
        <ReceivingQueue deliveries={deliveries} loading={loading} onSelect={openDelivery} onRefresh={load} />
      )}
      {subPage === 'active' && selectedDelivery && (
        <ActiveDeliveryView delivery={selectedDelivery} token={token} user={user} onComplete={() => { load(); setSubPage('queue'); setSelectedDelivery(null); }} />
      )}
      {subPage === 'consume' && (
        <YardsmanConsume token={token} user={user} onBack={() => setSubPage('queue')} />
      )}

      {/* New Delivery Modal */}
      {showNewDelivery && (
        <NewDeliveryModal token={token} onClose={() => setShowNewDelivery(false)} onSaved={() => { setShowNewDelivery(false); load(); }} />
      )}
    </div>
  );
};

// ── Pending Deliveries Queue ─────────────────────────────────
const ReceivingQueue = ({ deliveries, loading, onSelect, onRefresh }) => {
  if (loading) return <div className="flex justify-center py-12"><Spinner /></div>;
  if (!deliveries.length) return (
    <div className="hp-card text-center" style={{ padding: 48 }}>
      <Icon name="PackageCheck" size={40} />
      <p style={{ marginTop: 12, fontSize: 18, color: '#6b7280', fontWeight: 600 }}>No pending deliveries</p>
      <p style={{ fontSize: 15, color: '#9ca3af' }}>Click "New Delivery" to start receiving timber</p>
    </div>
  );
  return (
    <div className="space-y-3">
      {deliveries.map(d => {
        const assignedPacks = d.assigned_packs || 0;
        const expectedPacks = d.expected_packs || 0;
        const pct = expectedPacks > 0 ? Math.round((assignedPacks / expectedPacks) * 100) : 0;
        return (
          <div key={d.id} className="hp-card" style={{ cursor: 'pointer', borderLeft: `4px solid ${d.status === 'receiving' ? '#1D4ED8' : '#F59E0B'}` }}

            <div style={{ display: 'flex', alignItems: 'flex-start', gap: 16 }}>
              <div style={{ flex: 1 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
                  <span style={{ fontWeight: 800, fontSize: 18, color: '#07324C' }}>{d.supplier_name || 'Unknown Supplier'}</span>
                  <TimberStatusBadge status={d.status} />
                </div>
                <div style={{ fontSize: 15, color: '#374151', marginBottom: 8 }}>
                  Docket: <span style={{ fontFamily: 'monospace', fontWeight: 700 }}>{d.docket_number || '—'}</span>
                  {' · '}{d.delivery_date?.split('T')[0] || d.delivery_date || '—'}
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <div className="progress-bar-bg" style={{ flex: 1, height: 10 }}>
                    <div className="progress-bar-fill" style={{ width: `${pct}%` }} />
                  </div>
                  <span style={{ fontSize: 14, fontWeight: 700 }}>{assignedPacks} / {expectedPacks} packs</span>
                </div>
              </div>
              <Icon name="ChevronRight" size={24} />
            </div>
          </div>
        );
      })}
      <button className="btn btn-secondary btn-sm" onClick={onRefresh} style={{ marginTop: 8 }}>
        <Icon name="RefreshCw" size={16} /> Refresh
      </button>
    </div>
  );
};

// ── New Delivery Modal ─────────────────────────────────────────
const NewDeliveryModal = ({ token, onClose, onSaved }) => {
  const [hasDoc, setHasDoc] = useState(null); // null | true | false
  const [suppliers, setSuppliers] = useState([]);
  const [specs, setSpecs] = useState([]);
  const [form, setForm] = useState({ supplier_id: '', delivery_date: localDateStr(), docket_number: '', notes: '' });
  const [newSupplierName, setNewSupplierName] = useState('');
  const [showNewSupplier, setShowNewSupplier] = useState(false);
  const [items, setItems] = useState([{ description: '', spec_id: '', expected_packs: '', pcs_per_pack: '' }]);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    Promise.all([
      api('/timber/suppliers', {}, token).catch(() => []),
      api('/timber/specs', {}, token).catch(() => []),
    ]).then(([s, sp]) => { setSuppliers(s); setSpecs(sp); });
  }, [token]);

  const addItem = () => setItems(it => [...it, { description: '', spec_id: '', expected_packs: '', pcs_per_pack: '' }]);
  const removeItem = (i) => setItems(it => it.filter((_, idx) => idx !== i));
  const updateItem = (i, field, val) => setItems(it => it.map((item, idx) => idx === i ? { ...item, [field]: val } : item));

  const requestNewSupplier = async () => {
    if (!newSupplierName.trim()) return;
    try {
      const s = await api('/timber/suppliers', { method: 'POST', body: JSON.stringify({ name: newSupplierName, status: 'pending', requested_by: 'yardsman' }) }, token);
      toast('New supplier request submitted for approval', 'info');
      setSuppliers(prev => [...prev, s]);
      setForm(f => ({ ...f, supplier_id: s.id }));
      setShowNewSupplier(false);
      setNewSupplierName('');
    } catch (e) { toast(e.message, 'error'); }
  };

  const save = async () => {
    if (!form.supplier_id) { toast('Select a supplier', 'warning'); return; }
    if (!form.docket_number) { toast('Enter docket number', 'warning'); return; }
    setSaving(true);
    try {
      await api('/timber/deliveries', {
        method: 'POST',
        body: JSON.stringify({ ...form, items: items.filter(it => it.description || it.spec_id) })
      }, token);
      toast('Delivery saved', 'success');
      onSaved();
    } catch (e) { toast(e.message, 'error'); }
    setSaving(false);
  };

  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16 }}>
      <div style={{ background: 'white', borderRadius: 12, width: '100%', maxWidth: 700, maxHeight: '90vh', overflowY: 'auto', boxShadow: '0 20px 60px rgba(0,0,0,0.3)' }}>
        {/* Header */}
        <div style={{ display: 'flex', alignItems: 'center', padding: '20px 24px', borderBottom: '1px solid #e2e8f0' }}>
          <Icon name="PackagePlus" size={22} />
          <h2 style={{ fontWeight: 900, color: '#07324C', fontSize: 20, margin: '0 0 0 10px', flex: 1 }}>New Delivery</h2>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 22, color: '#9ca3af' }}>×</button>
        </div>

        <div style={{ padding: '20px 24px', space: 16 }}>
          {/* Paperwork toggle */}
          {hasDoc === null && (
            <div style={{ textAlign: 'center', padding: '20px 0' }}>
              <p style={{ fontSize: 17, fontWeight: 600, color: '#374151', marginBottom: 16 }}>Do you have delivery paperwork?</p>
              <div style={{ display: 'flex', gap: 16, justifyContent: 'center' }}>
                <button className="btn btn-primary btn-lg" onClick={() => setHasDoc(true)}>
                  <Icon name="FileText" size={20} /> Yes — I have a docket
                </button>
                <button className="btn btn-secondary btn-lg" onClick={() => setHasDoc(false)}>
                  <Icon name="PenLine" size={20} /> No — manual entry
                </button>
              </div>
            </div>
          )}

          {hasDoc !== null && (
            <div className="space-y-4">
              {hasDoc && (
                <div style={{ background: '#F0FDF4', border: '1px solid #BBF7D0', borderRadius: 8, padding: 14, marginBottom: 16 }}>
                  <p style={{ fontWeight: 700, color: '#166534', marginBottom: 8 }}>Capture Docket (optional)</p>
                  <div style={{ display: 'flex', gap: 10 }}>
                    <button className="btn btn-secondary" onClick={() => toast('Camera capture requires HTTPS — proceed to manual entry below', 'info')}>
                      <Icon name="Camera" size={18} /> Capture with Camera
                    </button>
                    <label className="btn btn-outline" style={{ cursor: 'pointer' }}>
                      <Icon name="Upload" size={18} /> Upload Image
                      <input type="file" accept="image/*" style={{ display: 'none' }} onChange={() => toast('Image captured — fill in details below', 'info')} />
                    </label>
                  </div>
                </div>
              )}

              {/* Form fields */}
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                <div style={{ gridColumn: '1 / -1' }}>
                  <label className="hp-label">Supplier *</label>
                  <div style={{ display: 'flex', gap: 8 }}>
                    <select className="hp-input" value={form.supplier_id} onChange={e => setForm(f => ({ ...f, supplier_id: e.target.value }))}>
                      <option value="">— Select Supplier —</option>
                      {suppliers.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                    </select>
                    <button className="btn btn-outline btn-sm" style={{ flexShrink: 0 }} onClick={() => setShowNewSupplier(v => !v)}>+ New</button>
                  </div>

                    <div style={{ marginTop: 8, display: 'flex', gap: 8 }}>
                      <input className="hp-input" placeholder="New supplier name" value={newSupplierName} onChange={e => setNewSupplierName(e.target.value)} />

                    </div>
                  )}
                </div>
                <div>
                  <label className="hp-label">Delivery Date *</label>
                  <input className="hp-input" type="date" value={form.delivery_date} onChange={e => setForm(f => ({ ...f, delivery_date: e.target.value }))} />
                </div>
                <div>
                  <label className="hp-label">Docket Number *</label>
                  <input className="hp-input" value={form.docket_number} onChange={e => setForm(f => ({ ...f, docket_number: e.target.value }))} placeholder="e.g. DN-12345" />
                </div>
                <div style={{ gridColumn: '1 / -1' }}>
                  <label className="hp-label">Notes</label>
                  <input className="hp-input" value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} placeholder="Optional notes" />

              {/* Line items */}
              <div>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>

                  <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 15 }}>

                        <th style={{ padding: '8px 10px', textAlign: 'left', fontWeight: 700 }}>Description</th>
                        <th style={{ padding: '8px 10px', textAlign: 'left', fontWeight: 700 }}>Spec (MYOB)</th>
                        <th style={{ padding: '8px 10px', textAlign: 'left', fontWeight: 700 }}>Exp. Packs</th>

                      ))}
                    </tbody>
