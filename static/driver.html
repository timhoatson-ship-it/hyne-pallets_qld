// INCIDENT REPORTING — UPGRADED with photo capture
// ═══════════════════════════════════════════════════════════════
const INCIDENT_TYPES = [
  { value: "vehicle_damage", label: "Vehicle Damage" },
  { value: "product_damage", label: "Product Damage" },
  { value: "road_incident", label: "Road Incident" },
  { value: "customer_issue", label: "Customer Issue" },
  { value: "safety_concern", label: "Safety Concern" },
  { value: "near_miss", label: "Near Miss" },
  { value: "other", label: "Other" },
];

const IncidentReport = ({ shift, token, deliveries, onClose }) => {
  const [incidentType, setIncidentType] = useState("");
  const [description, setDescription] = useState("");
  const [deliveryId, setDeliveryId] = useState("");
  const [photoBase64, setPhotoBase64] = useState(null);
  const [photoPreview, setPhotoPreview] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [showPhotoCapture, setShowPhotoCapture] = useState(false);
  const fileRef = useRef(null);

  const handlePhotoFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    try {
      const data = await resizeImage(file, 800);
      setPhotoBase64(data);
      setPhotoPreview(data);
    } catch (err) {
      toast("Could not process photo", "error");
    }
  };

  const handleSubmit = async () => {
    if (!incidentType || !description.trim()) {
      toast("Select type and add description", "error");
      return;
    }
    setSubmitting(true);
    try {
      const loc = await getLocation();
      await api("/driver/incident", {
        method: "POST",
        body: JSON.stringify({
          shift_id: shift.id,
          delivery_log_id: deliveryId || null,
          incident_type: incidentType,
          description: description.trim(),
          photo_data: photoBase64 || null,
          lat: loc.lat,
          lng: loc.lng,
        }),
      }, token);
      setSubmitted(true);
      toast("Incident reported", "success");
    } catch (e) {
      toast(e.message, "error");
    } finally {
      setSubmitting(false);
    }
  };

  if (submitted) {
    return (
      <div className="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <div className="text-center p-6">
          <div className="text-6xl mb-4">✓</div>
          <h2 className="text-2xl font-bold text-navy mb-2">Incident Reported</h2>
          <p className="text-gray-500 mb-6">Management has been notified. Stay safe.</p>
          <button onClick={onClose} className="px-8 py-4 rounded-xl text-white font-bold text-lg" style={{ background: "#07324C" }}>Close</button>
        </div>
      </div>
    );
  }

  return (
    <div className="fixed inset-0 bg-white z-50 overflow-y-auto">
      <div className="p-4 max-w-md mx-auto">
        <div className="flex items-center justify-between mb-4">
          <h2 className="text-2xl font-bold text-navy">Report Incident</h2>
          <button onClick={onClose} className="text-gray-400 text-3xl w-10 h-10 flex items-center justify-center">&times;</button>
        </div>

        <label className="block text-base font-semibold text-navy mb-2">Incident Type *</label>
        <div className="space-y-2 mb-5">
          {INCIDENT_TYPES.map(t => (
            <button key={t.value} onClick={() => setIncidentType(t.value)}
                    className="w-full p-4 rounded-xl text-left text-lg font-medium transition-all"
                    style={{ border: incidentType === t.value ? "3px solid #07324C" : "2px solid #E5E7EB",
                             background: incidentType === t.value ? "#F0F7FF" : "white", color: "#07324C" }}>
              {t.label}
            </button>
          ))}
        </div>

        {deliveries && deliveries.length > 0 && (
          <div className="mb-5">
            <label className="block text-base font-semibold text-navy mb-2">Related Delivery (optional)</label>
            <select value={deliveryId} onChange={e => setDeliveryId(e.target.value)}
                    className="w-full p-4 rounded-xl border-2 border-gray-200 text-lg text-navy"
                    style={{ background: "white" }}>
              <option value="">— None —</option>
              {deliveries.map(d => (
                <option key={d.id} value={d.id}>{d.client_name || d.order_number || `Stop #${d.id}`}</option>
              ))}
            </select>
          </div>
        )}

        <label className="block text-base font-semibold text-navy mb-2">Description *</label>
        <textarea value={description} onChange={e => setDescription(e.target.value)}
                  rows={5} placeholder="Describe what happened..."
                  className="w-full p-4 rounded-xl border-2 border-gray-200 text-lg text-navy mb-4"
                  style={{ resize: "vertical", minHeight: "120px" }} />

        {/* Photo attachment */}
        <div className="mb-5">
          <label className="block text-base font-semibold text-navy mb-2">Photo (optional)</label>
          <input ref={fileRef} type="file" accept="image/*" capture="environment"
                 onChange={handlePhotoFile} style={{ display: "none" }} />
          {photoPreview ? (
            <div>
              <img src={photoPreview} alt="Incident photo" className="photo-preview mb-2" />
              <button onClick={() => { setPhotoBase64(null); setPhotoPreview(null); if (fileRef.current) fileRef.current.value = ""; }}
                      className="text-sm text-red-500 underline">Remove photo</button>
            </div>
          ) : (
            <button onClick={() => fileRef.current && fileRef.current.click()}
                    className="w-full py-4 rounded-xl font-semibold text-navy border-2 border-gray-200 bg-white text-base">
              📷 Add Photo
            </button>
          )}
        </div>

        <button onClick={handleSubmit} disabled={submitting || !incidentType || !description.trim()}
                className="w-full py-5 rounded-2xl text-xl font-bold text-white transition-all"
                style={{ background: (incidentType && description.trim()) ? "#ED1C24" : "#D1D5DB" }}>
          {submitting ? "Submitting..." : "Submit Incident Report"}
        </button>
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// MAIN DRIVER APP — MAJOR REWRITE with all Block 3 features
// ═══════════════════════════════════════════════════════════════
const DriverApp = ({ user, token, shift, onClockOff }) => {
  const [tab, setTab] = useState("current");
  const [deliveries, setDeliveries] = useState([]);
  const [upcoming, setUpcoming] = useState([]);
  const [loading, setLoading] = useState(true);
  const [activeDeliveryIdx, setActiveDeliveryIdx] = useState(0);
  const [currentStage, setCurrentStage] = useState(null);
  const [currentStageId, setCurrentStageId] = useState(null);
  const [stageStartedAt, setStageStartedAt] = useState(null);
  const [allStages, setAllStages] = useState([]);
  const [isOnBreak, setIsOnBreak] = useState(false);
  const [breakStageId, setBreakStageId] = useState(null);
  const [breakStartedAt, setBreakStartedAt] = useState(null);
  const [pausedStage, setPausedStage] = useState(null);
  const [pausedStageId, setPausedStageId] = useState(null);
  const [menuOpen, setMenuOpen] = useState(false);
  const [showSummary, setShowSummary] = useState(false);
  const [showRunSheet, setShowRunSheet] = useState(false);
  const [showIncident, setShowIncident] = useState(false);
  const [showGPSStatus, setShowGPSStatus] = useState(false);
  const [shiftCosts, setShiftCosts] = useState([]);
  const [stopNumber, setStopNumber] = useState(1);
  const [isOnline, setIsOnline] = useState(navigator.onLine);
  const [offlineQueue, setOfflineQueue] = useState([]);

  // Fatigue state
  const [fatigueWarning, setFatigueWarning] = useState(null); // null | { level: 'warning'|'critical', message, type }
  const [showFatigueBlocker, setShowFatigueBlocker] = useState(false);
  const [fatigueBlockerType, setFatigueBlockerType] = useState(null); // 'break' | 'max_shift'

  // Modal states
  const [showStageComplete, setShowStageComplete] = useState(false);
  const [stageCompleteData, setStageCompleteData] = useState(null); // { stage, duration, nextStage }
  const [showMultiDrop, setShowMultiDrop] = useState(false);
  const [multiDropNextDelivery, setMultiDropNextDelivery] = useState(null);
  const [showOdometerPrompt, setShowOdometerPrompt] = useState(false);
  const [odometerPromptTitle, setOdometerPromptTitle] = useState("");
  const [odometerPromptResolve, setOdometerPromptResolve] = useState(null);
  const [showPhotoCapture, setShowPhotoCapture] = useState(false);
  const [photoCaptureTitle, setPhotoCaptureTitle] = useState("");
  const [photoCaptureResolve, setPhotoCaptureResolve] = useState(null);
  const [showSignatureCapture, setShowSignatureCapture] = useState(false);
  const [signatureCaptureResolve, setSignatureCaptureResolve] = useState(null);
  const [showCostBreakdown, setShowCostBreakdown] = useState(false);
  const [costBreakdownData, setCostBreakdownData] = useState(null);

  // Pending action for after modals
  const pendingActionRef = useRef(null);
  const odometerDataRef = useRef(null);

  const loadData = useCallback(async () => {
    try {
      const today = new Date().toISOString().split("T")[0];
      const data = await api(`/driver/load?truck_id=${shift.truck_id}&date=${today}`, {}, token);
      setDeliveries(data || []);
      const upcoming_data = await api(`/driver/upcoming?truck_id=${shift.truck_id}&date=${today}`, {}, token);
      setUpcoming(upcoming_data || []);
      const stageData = await api(`/driver/stages?shift_id=${shift.id}`, {}, token);
      setAllStages(stageData || []);
      // Restore active stage — find most recent open stage
      const openStages = (stageData || []).filter(s => !s.ended_at);
      const active = openStages.length > 0
        ? openStages.reduce((latest, s) => !latest || s.started_at > latest.started_at ? s : latest, null)
        : null;
      if (active) {
        if (active.stage === "break") {
          setIsOnBreak(true);
          setBreakStageId(active.id);
          setBreakStartedAt(active.started_at);
          setStageStartedAt(active.started_at);
        } else {
          setCurrentStage(active.stage);
          setCurrentStageId(active.id);
          setStageStartedAt(active.started_at);
        }
      }
    } catch (e) {
      console.error("Load error:", e);
    } finally {
      setLoading(false);
    }
  }, [shift, token]);

  useEffect(() => { loadData(); }, [loadData]);

  // Online/offline detection + offline queue sync
  useEffect(() => {
    const handleOnline = () => {
      setIsOnline(true);
      flushOfflineQueue(token);
      const q = JSON.parse(localStorage.getItem("offline_queue") || "[]");
      setOfflineQueue(q);
    };
    const handleOffline = () => setIsOnline(false);
    window.addEventListener("online", handleOnline);
    window.addEventListener("offline", handleOffline);
    // Init queue state
    setOfflineQueue(JSON.parse(localStorage.getItem("offline_queue") || "[]"));
    return () => {
      window.removeEventListener("online", handleOnline);
      window.removeEventListener("offline", handleOffline);
    };
  }, [token]);

  // Fatigue polling — every 5 minutes
  useEffect(() => {
    const checkFatigue = async () => {
      try {
        const data = await api(`/driver/fatigue-check?shift_id=${shift.id}`, {}, token);
        if (data && data.level) {
          setFatigueWarning(data);
          if (data.level === "critical") {
            if (data.type === "max_shift") {
              setFatigueBlockerType("max_shift");
              setShowFatigueBlocker(true);
            } else {
              setFatigueBlockerType("break");
              setShowFatigueBlocker(true);
            }
          }
        } else {
          setFatigueWarning(null);
        }
      } catch (e) {
        // Silently fail — don't block the driver on API failure
      }
    };
    checkFatigue();
    const interval = setInterval(checkFatigue, 5 * 60 * 1000);
    return () => clearInterval(interval);
  }, [shift.id, token]);

  // Active delivery and stage pipeline
  const activeDelivery = deliveries.find(d => d.status !== "delivered" && d.status !== "collected") || deliveries[activeDeliveryIdx];
  const deliveryType = activeDelivery?.delivery_type || activeDelivery?.order_delivery_type || "delivery";

  const effectiveStages = (() => {
    if (deliveryType === "collection") return COLLECTION_STAGES;
    if (stopNumber > 1) {
      const skipToIdx = DELIVERY_STAGES.indexOf("driving_to_customer");
      return skipToIdx >= 0 ? DELIVERY_STAGES.slice(skipToIdx) : DELIVERY_STAGES;
    }
    return DELIVERY_STAGES;
  })();

  const currentStageIdx = currentStage ? effectiveStages.indexOf(currentStage) : -1;
  const nextStageIdx = currentStage ? currentStageIdx + 1 : 0;
  const nextStage = !currentStage ? effectiveStages[0] : (nextStageIdx < effectiveStages.length ? effectiveStages[nextStageIdx] : null);

  // Stages completed for the pipeline (from allStages history)
  const completedStageNames = allStages.filter(s => s.ended_at && s.stage !== "break").map(s => s.stage);

  // Prompt for odometer (returns a promise)
  const promptOdometer = (title) => new Promise((resolve) => {
    setOdometerPromptTitle(title);
    setOdometerPromptResolve({ fn: resolve });
    setShowOdometerPrompt(true);
  });

  // Prompt for photo (returns a promise)
  const promptPhoto = (title) => new Promise((resolve) => {
    setPhotoCaptureTitle(title);
    setPhotoCaptureResolve({ fn: resolve });
    setShowPhotoCapture(true);
  });

  // Prompt for signature (returns a promise)
  const promptSignature = () => new Promise((resolve) => {
    setSignatureCaptureResolve({ fn: resolve });
    setShowSignatureCapture(true);
  });

  // Action label
  const getNextActionLabel = () => {
    if (isOnBreak) return "End Break";
    if (!activeDelivery) return "No deliveries";
    if (!currentStage && nextStage) return `Start: ${STAGE_LABELS[nextStage]}`;
    if (currentStage && nextStage) return `Next: ${STAGE_LABELS[nextStage]}`;
    if (currentStage && !nextStage) {
      const nextDel = deliveries.find(d => d.id !== activeDelivery?.id && d.status !== "delivered" && d.status !== "collected");
      if (nextDel) return "Complete & Next Stop →";
      return "Complete Delivery ✓";
    }
    return "Ready";
  };

  // Is current stage a driving stage?
  const isDrivingStage = (stage) => stage?.includes("driving");

  // Compute total km driven for a delivery from stage odometer data.
  // Returns a number if odometer data is available, otherwise null.
  const computeDeliveryKm = (deliveryLogId) => {
    const deliveryStages = allStages.filter(s => s.delivery_log_id === deliveryLogId);
    let total = 0;
    let hasData = false;
    for (const s of deliveryStages) {
      if (s.manual_km) {
        total += s.manual_km;
        hasData = true;
      } else if (s.odometer_start != null && s.odometer_end != null) {
        total += (s.odometer_end - s.odometer_start);
        hasData = true;
      }
    }
    return hasData ? total : null;
  };

  const handleNextAction = async () => {
    // End break
    if (isOnBreak && breakStageId) {
      try {
        await api("/driver/break/end", { method: "POST", body: JSON.stringify({ stage_id: breakStageId }) }, token);
        setIsOnBreak(false);
        setBreakStageId(null);
        setBreakStartedAt(null);
        if (pausedStage) {
          setCurrentStage(pausedStage);
          setCurrentStageId(pausedStageId);
          setPausedStage(null);
          setPausedStageId(null);
        }
        toast("Break ended", "info");
        loadData();
      } catch (e) { toast(e.message, "error"); }
      return;
    }

    if (!activeDelivery) return;
    const loc = await getLocation();

    // ---- End current stage ----
    if (currentStageId) {
      let endBody = { stage_id: currentStageId };

      // If ending a driving stage, prompt for odometer
      if (isDrivingStage(currentStage)) {
        const odoData = await promptOdometer(`Ending: ${STAGE_LABELS[currentStage] || currentStage}`);
        if (odoData) {
          endBody.odometer = odoData.odometer || null;
          endBody.manual_km = odoData.manual_km || null;
        }
      }

      // If ending being_unloaded or being_unloaded_at_depot, prompt for POD photo
      if (currentStage === "being_unloaded" || currentStage === "being_unloaded_at_depot" || currentStage === "being_loaded_at_customer") {
        const photoData = await promptPhoto("Proof of Delivery");
        if (photoData) {
          endBody.photo_data = photoData;
          // Also upload to photo endpoint
          try {
            await api("/driver/photo", {
              method: "POST",
              body: JSON.stringify({
                delivery_log_id: activeDelivery.id,
                shift_id: shift.id,
                photo_type: "pod",
                photo_data: photoData,
                lat: loc.lat,
                lng: loc.lng,
              }),
            }, token);
          } catch (e) { console.warn("Photo upload failed:", e); }
        }
        // After photo, prompt for customer signature
        const sigData = await promptSignature();
        if (sigData) {
          try {
            await api("/driver/photo", {
              method: "POST",
              body: JSON.stringify({
                delivery_log_id: activeDelivery.id,
                shift_id: shift.id,
                photo_type: "signature",
                photo_data: sigData,
                lat: loc.lat,
                lng: loc.lng,
              }),
            }, token);
          } catch (e) { console.warn("Signature upload failed:", e); }
        }
      }

      try {
        await api("/driver/stage/end", { method: "POST", body: JSON.stringify(endBody) }, token);
      } catch (e) {
        if (!navigator.onLine) {
          queueOfflineAction({ type: "stage_end", data: endBody });
          toast("Queued offline — will sync when connected", "info");
        } else {
          toast(e.message, "error");
          return;
        }
      }
    }

    // ---- Start next stage or complete delivery ----
    if (nextStage) {
      let startBody = {
        delivery_log_id: activeDelivery.id,
        shift_id: shift.id,
        stage: nextStage,
        stop_number: stopNumber,
        lat: loc.lat,
        lng: loc.lng,
        gps_accuracy: loc.accuracy,
      };

      // If starting a driving stage, prompt for odometer
      if (isDrivingStage(nextStage)) {
        const odoData = await promptOdometer(`Starting: ${STAGE_LABELS[nextStage] || nextStage}`);
        if (odoData) {
          startBody.odometer = odoData.odometer || null;
        }
      }

      try {
        const data = await api("/driver/stage/start", { method: "POST", body: JSON.stringify(startBody) }, token);
        setCurrentStage(nextStage);
        setCurrentStageId(data.id);
        setStageStartedAt(data.started_at);

        // Update delivery status
        if (nextStage === "being_loaded" || nextStage === "being_loaded_at_customer") {
          await api("/driver/delivery/status", { method: "PUT", body: JSON.stringify({ delivery_log_id: activeDelivery.id, status: "loaded" }) }, token).catch(() => {});
        } else if (nextStage === "driving_to_customer" || nextStage === "driving_return") {
          await api("/driver/delivery/status", { method: "PUT", body: JSON.stringify({ delivery_log_id: activeDelivery.id, status: "in_transit" }) }, token).catch(() => {});
        }

        // Show stage complete prompt for next action info
        const prevStageName = currentStage;
        const prevStageDuration = (() => {
          const found = allStages.filter(s => s.stage === prevStageName && s.ended_at).sort((a, b) => b.started_at > a.started_at ? 1 : -1)[0];
          return found ? (found.duration_minutes || 0) : 0;
        })();

        toast(`${STAGE_LABELS[nextStage]}`, "success");
      } catch (e) {
        if (!navigator.onLine) {
          queueOfflineAction({ type: "stage_start", data: startBody });
          setCurrentStage(nextStage);
          setStageStartedAt(new Date().toISOString());
          toast("Queued offline — will sync when connected", "info");
        } else {
          toast(e.message, "error");
          return;
        }
      }
    } else {
      // Complete delivery
      const nextDel = deliveries.find(d => d.id !== activeDelivery.id && d.status !== "delivered" && d.status !== "collected");

      try {
        await api("/driver/delivery/complete", {
          method: "POST",
          body: JSON.stringify({
            delivery_log_id: activeDelivery.id,
            shift_id: shift.id,
            total_km: computeDeliveryKm(activeDelivery.id), // computed from stage odometer readings; null if unavailable (server recalculates)
            tolls: 0,
          }),
        }, token);

        setCurrentStage(null);
        setCurrentStageId(null);
        setStageStartedAt(null);
        toast(deliveryType === "collection" ? "Collection complete!" : "Delivery complete!", "success");

        // Store cost breakdown data (viewable from menu, not auto-shown to avoid interrupting multi-drop)
        try {
          const costs = await api(`/driver/cost-breakdown?delivery_log_id=${activeDelivery.id}`, {}, token);
          if (costs) {
            setCostBreakdownData(costs);
          }
        } catch (e) { /* cost breakdown is optional */ }

        // Show multi-drop prompt
        setMultiDropNextDelivery(nextDel || null);
        setShowMultiDrop(true);
      } catch (e) { toast(e.message, "error"); return; }
    }

    loadData();
  };

  const handleBreak = async () => {
    if (isOnBreak) return;
    const loc = await getLocation();
    setPausedStage(currentStage);
    setPausedStageId(currentStageId);
    try {
      const data = await api("/driver/break/start", {
        method: "POST",
        body: JSON.stringify({
          delivery_log_id: activeDelivery?.id,
          shift_id: shift.id,
          lat: loc.lat,
          lng: loc.lng,
        }),
      }, token);
      setIsOnBreak(true);
      setBreakStageId(data.id);
      setBreakStartedAt(data.started_at);
      setStageStartedAt(data.started_at);
      toast("Break started", "info");
      setShowFatigueBlocker(false);
      loadData();
    } catch (e) { toast(e.message, "error"); }
  };

  const handleClockOff = async () => {
    setMenuOpen(false);
    // Clock-off confirmation removed: user explicitly tapped clock-off from the menu (confirm() is unreliable in iOS PWA standalone mode)

    // Prompt for ending odometer
    const odoData = await promptOdometer("Ending Odometer Reading");
    const odometerEnd = odoData ? (odoData.odometer || null) : null;

    // End any active stage
    if (currentStageId) {
      try { await api("/driver/stage/end", { method: "POST", body: JSON.stringify({ stage_id: currentStageId }) }, token); } catch {}
    }
    if (breakStageId) {
      try { await api("/driver/break/end", { method: "POST", body: JSON.stringify({ stage_id: breakStageId }) }, token); } catch {}
    }
    try {
      await api("/driver/clock-off", { method: "POST", body: JSON.stringify({ odometer_end: odometerEnd }) }, token);
      toast("Shift complete — drive safe!", "success");
      onClockOff();
    } catch (e) { toast(e.message, "error"); }
  };

  const handleShowSummary = async () => {
    try {
      const costs = await api(`/driver/cost-breakdown?shift_id=${shift.id}`, {}, token);
      setShiftCosts(costs ? [costs] : []);
    } catch {}
    setShowSummary(true);
    setMenuOpen(false);
  };

  const handleMultiDropNext = () => {
    setShowMultiDrop(false);
    setStopNumber(s => s + 1);
    // Start from driving_to_customer for next stop
    setCurrentStage(null);
    setCurrentStageId(null);
    loadData();
  };

  const handleMultiDropReturn = () => {
    setShowMultiDrop(false);
    setCurrentStage(null);
    setCurrentStageId(null);
    loadData();
  };

  // Offline queue display
  const pendingOfflineCount = offlineQueue.length;

  if (loading) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-gray-50">
        <div className="text-center">
          <div className="animate-spin w-12 h-12 border-4 border-navy border-t-transparent rounded-full mx-auto mb-4"></div>
          <p className="text-gray-500 text-lg">Loading your run...</p>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-gray-50">
      {/* Fatigue blocker — blocks entire screen if needed */}
      {showFatigueBlocker && (
        <FatigueBlocker
          type={fatigueBlockerType}
          onBreak={handleBreak}
          onClockOff={handleClockOff}
        />
      )}

      {/* Offline banner */}
      {!isOnline && (
        <div className="offline-banner">
          📴 Offline — actions will sync when reconnected
          {pendingOfflineCount > 0 && ` (${pendingOfflineCount} queued)`}
        </div>
      )}
      {isOnline && pendingOfflineCount > 0 && (
        <div style={{ background: "#F59E0B" }} className="text-white text-center py-2 font-bold text-sm px-4">
          🔄 Syncing {pendingOfflineCount} offline action{pendingOfflineCount > 1 ? "s" : ""}...
        </div>
      )}

      {/* Fatigue warning banner (non-blocking) */}
      {fatigueWarning && fatigueWarning.level === "warning" && (
        <div className="fatigue-warning">
          ⚠️ {fatigueWarning.message || "Approaching break threshold — consider taking a break"}
        </div>
      )}

      {/* Header */}
      <div className="bg-navy text-white px-4 py-3 flex items-center justify-between" style={{ paddingTop: "env(safe-area-inset-top, 12px)" }}>
        <div className="flex items-center gap-3">
          <div style={{ width:28, height:28, background:"#ED1C24", clipPath:"polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)" }} />
          <div>
            <div className="text-base font-bold">{user.full_name} — {shift.truck_name || `Truck ${shift.truck_id}`}</div>
            <div className="text-xs text-white/60">{shift.truck_rego} • {new Date().toLocaleDateString("en-AU", { weekday: "short", day: "numeric", month: "short" })}</div>
          </div>
        </div>
        <button onClick={() => setMenuOpen(true)} className="p-2 text-2xl" style={{ minWidth: 44, minHeight: 44 }}>☰</button>
      </div>

      {/* Timer */}
      <TimerDisplay stage={isOnBreak ? "break" : currentStage} startedAt={stageStartedAt} isBreak={isOnBreak} />

      {/* Stage pipeline */}
      {activeDelivery && (
        <StagePipeline
          stages={effectiveStages}
          currentStage={isOnBreak ? null : currentStage}
          completedStages={completedStageNames}
        />
      )}

      {/* Run summary bar */}
      <div className="bg-white px-4 py-3 flex justify-between border-b border-gray-200">
        <div className="text-center">
          <div className="text-sm text-gray-500">Stops</div>
          <div className="text-lg font-bold text-navy">{deliveries.length}</div>
        </div>
        <div className="text-center">
          <div className="text-sm text-gray-500">Est. Time</div>
          <div className="text-lg font-bold text-navy">
            {fmtMins(deliveries.reduce((a, d) => a + (d.estimated_travel_minutes || d.estimated_minutes || 30), 0))}
          </div>
        </div>
        <div className="text-center">
          <div className="text-sm text-gray-500">Units</div>
          <div className="text-lg font-bold text-navy">
            {deliveries.reduce((a, d) => a + (d.total_qty || 0), 0)}
          </div>
        </div>
        <div className="text-center">
          <div className="text-sm text-gray-500">Done</div>
          <div className="text-lg font-bold text-green-600">
            {deliveries.filter(d => d.status === "delivered" || d.status === "collected").length}/{deliveries.length}
          </div>
        </div>
      </div>

      {/* Tab content */}
      <div className="content-scroll">
        {tab === "current" ? (
          <div className="px-4 pb-4">
            {allStages.length > 0 && <StageHistory stages={allStages} />}
            {deliveries.length === 0 ? (
              <div className="text-center py-16">
                <div className="text-5xl mb-4">📦</div>
                <p className="text-xl text-gray-500">No deliveries assigned today</p>
                <p className="text-base text-gray-400 mt-2">Check with dispatch for your load</p>
              </div>
            ) : (
              deliveries.map((d, i) => (
                <DeliveryCard key={d.id} delivery={d}
                              isActive={activeDelivery?.id === d.id}
                              onTap={() => setActiveDeliveryIdx(i)} />
              ))
            )}
          </div>
        ) : tab === "upcoming" ? (
          <div className="px-4 pb-4 pt-3">
            {upcoming.length === 0 ? (
              <div className="text-center py-16">
                <p className="text-xl text-gray-500">No upcoming runs</p>
              </div>
            ) : (
              upcoming.map(d => <DeliveryCard key={d.id} delivery={d} isActive={false} onTap={() => {}} />)
            )}
          </div>
        ) : (
          <LogbookTab shift={shift} token={token} />
        )}
      </div>

      {/* Break button (floating) */}
      {currentStage && !isOnBreak && (
        <button onClick={handleBreak}
                className="fixed right-4 text-white font-bold px-5 py-3 rounded-full shadow-lg text-base"
                style={{ bottom: "148px", background: "#6B7280", zIndex: 40, minHeight: 44 }}>
          ☕ Break
        </button>
      )}

      {/* Next Action Button */}
      <div className="action-btn">
        <button onClick={handleNextAction}
                disabled={!activeDelivery && !isOnBreak}
                style={{ background: isOnBreak ? "#6B7280" : (currentStage && !nextStage ? "#059669" : "#07324C") }}>
          {getNextActionLabel()}
        </button>
      </div>

      {/* Tab bar — 3 tabs */}
      <div className="tab-bar">
        <button className={tab === "current" ? "active" : ""} onClick={() => setTab("current")}>
          📦 Current Load
        </button>
        <button className={tab === "upcoming" ? "active" : ""} onClick={() => setTab("upcoming")}>
          📋 Upcoming
        </button>
        <button className={tab === "logbook" ? "active" : ""} onClick={() => setTab("logbook")}>
          📓 Logbook
        </button>
      </div>

      {/* Menu overlay */}
      {menuOpen && (
        <>
          <div className="menu-overlay" onClick={() => setMenuOpen(false)} />
          <div className="menu-panel">
            <div className="flex items-center justify-between mb-6">
              <h3 className="text-xl font-bold text-navy">Menu</h3>
              <button onClick={() => setMenuOpen(false)} className="text-2xl text-gray-400 w-10 h-10 flex items-center justify-center">&times;</button>
            </div>
            {costBreakdownData && (
              <div className="menu-item" onClick={() => { setShowCostBreakdown(true); setMenuOpen(false); }}>💰 View Costs</div>
            )}
            <div className="menu-item" onClick={handleShowSummary}>📊 Shift Summary</div>
            <div className="menu-item" onClick={() => { setShowRunSheet(true); setMenuOpen(false); }}>📋 Run Sheet</div>
            <div className="menu-item" onClick={() => { setShowIncident(true); setMenuOpen(false); }}>⚠️ Report Incident</div>
            <div className="menu-item" onClick={() => { setShowGPSStatus(true); setMenuOpen(false); }}>📍 GPS Status</div>
            <div className="menu-item" onClick={() => { loadData(); setMenuOpen(false); toast("Refreshed", "info"); }}>🔄 Refresh Data</div>
            <div className="menu-item" style={{ color: "#ED1C24" }} onClick={handleClockOff}>🔴 Clock Off</div>
          </div>
        </>
      )}

      {/* Modals */}

      {/* Stage Complete Prompt */}
      {showStageComplete && stageCompleteData && (
        <StageCompletePrompt
          completedStage={stageCompleteData.stage}
          completedDuration={stageCompleteData.duration}
          nextStage={stageCompleteData.nextStage}
          onStartNext={() => { setShowStageComplete(false); if (stageCompleteData.onNext) stageCompleteData.onNext(); }}
          onBreak={() => { setShowStageComplete(false); handleBreak(); }}
          onClose={() => setShowStageComplete(false)}
        />
      )}

      {/* Multi-Drop Prompt */}
      {showMultiDrop && (
        <MultiDropPrompt
          nextDelivery={multiDropNextDelivery}
          onNextStop={handleMultiDropNext}
          onReturnDepot={handleMultiDropReturn}
        />
      )}

      {/* Odometer Prompt */}
      {showOdometerPrompt && (
        <OdometerPrompt
          title={odometerPromptTitle}
          onConfirm={(data) => {
            setShowOdometerPrompt(false);
            if (odometerPromptResolve) {
              odometerPromptResolve.fn(data);
              setOdometerPromptResolve(null);
            }
          }}
          onSkip={() => {
            setShowOdometerPrompt(false);
            if (odometerPromptResolve) {
              odometerPromptResolve.fn(null);
              setOdometerPromptResolve(null);
            }
          }}
        />
      )}

      {/* Photo Capture */}
      {showPhotoCapture && (
        <PhotoCapture
          title={photoCaptureTitle}
          onConfirm={(base64) => {
            setShowPhotoCapture(false);
            if (photoCaptureResolve) {
              photoCaptureResolve.fn(base64);
              setPhotoCaptureResolve(null);
            }
          }}
          onSkip={() => {
            setShowPhotoCapture(false);
            if (photoCaptureResolve) {
              photoCaptureResolve.fn(null);
              setPhotoCaptureResolve(null);
            }
          }}
        />
      )}

      {/* Signature Capture */}
      {showSignatureCapture && (
        <SignatureCapture
          onConfirm={(dataUrl) => {
            setShowSignatureCapture(false);
            if (signatureCaptureResolve) {
              signatureCaptureResolve.fn(dataUrl);
              setSignatureCaptureResolve(null);
            }
          }}
          onSkip={() => {
            setShowSignatureCapture(false);
            if (signatureCaptureResolve) {
              signatureCaptureResolve.fn(null);
              setSignatureCaptureResolve(null);
            }
          }}
        />
      )}

      {/* Cost Breakdown Modal (after delivery complete) */}
      {showCostBreakdown && costBreakdownData && (
        <CostBreakdownModal
          costs={costBreakdownData}
          title="Delivery Cost Breakdown"
          onClose={() => setShowCostBreakdown(false)}
        />
      )}

      {/* Shift Summary Modal */}
      {showSummary && (
        <ShiftSummary shift={shift} stages={allStages} costs={shiftCosts} onClose={() => setShowSummary(false)} />
      )}

      {/* Run Sheet Modal */}
      {showRunSheet && (
        <RunSheetView shift={shift} token={token} onClose={() => setShowRunSheet(false)} />
      )}

      {/* Incident Report Modal */}
      {showIncident && (
        <IncidentReport shift={shift} token={token} deliveries={deliveries} onClose={() => setShowIncident(false)} />
      )}

      {/* GPS Status Modal */}
      {showGPSStatus && (
        <GPSStatusModal shift={shift} token={token} onClose={() => setShowGPSStatus(false)} />
      )}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// APP ROOT — with odometer screen between safety and truck
// ═══════════════════════════════════════════════════════════════
const App = () => {
  const [screen, setScreen] = useState("login"); // login | safety | odometer | truck | app
  const [token, setToken] = useState(null);
  const [user, setUser] = useState(null);
  const [defaultTruck, setDefaultTruck] = useState(null);
  const [trucks, setTrucks] = useState([]);
  const [shift, setShift] = useState(null);
  const [clockLoading, setClockLoading] = useState(false);
  const [safetyChecklist, setSafetyChecklist] = useState([]);
  const [odometerStart, setOdometerStart] = useState(null);

  // Restore session
  useEffect(() => {
    const saved = localStorage.getItem("driver_session");
    if (saved) {
      try {
        const s = JSON.parse(saved);
        setToken(s.token);
        setUser(s.user);
        api("/driver/shift", {}, s.token).then(data => {
          if (data) {
            setShift(data);
            setScreen("app");
          } else {
            loadTrucks(s.token);
            setScreen("safety");
          }
        }).catch(() => {
          localStorage.removeItem("driver_session");
        });
      } catch {
        localStorage.removeItem("driver_session");
      }
    }
  }, []);

  const loadTrucks = async (tok) => {
    try {
      const data = await api("/driver/trucks", {}, tok);
      setTrucks(data || []);
    } catch (e) { console.error(e); }
  };

  const handleLogin = (data) => {
    setToken(data.token);
    setUser(data.user);
    setDefaultTruck(data.default_truck || null);
    localStorage.setItem("driver_session", JSON.stringify({ token: data.token, user: data.user }));

    api("/driver/shift", {}, data.token).then(shiftData => {
      if (shiftData) {
        setShift(shiftData);
        setScreen("app");
      } else {
        loadTrucks(data.token);
        setScreen("safety");
      }
    }).catch(() => {
      loadTrucks(data.token);
      setScreen("safety");
    });
  };

  const handleSafetyConfirm = (checklist) => {
    setSafetyChecklist(checklist);
    setScreen("odometer");
  };

  const handleOdometerConfirm = (value) => {
    setOdometerStart(value);
    setScreen("truck");
  };

  const handleTruckSelect = async (truckId) => {
    setClockLoading(true);
    try {
      const data = await api("/driver/clock-on", {
        method: "POST",
        body: JSON.stringify({
          truck_id: truckId,
          safety_checklist: safetyChecklist,
          odometer_start: odometerStart,
        }),
      }, token);
      const shiftData = await api("/driver/shift", {}, token);
      setShift(shiftData || data);
      setScreen("app");
      toast("Shift started — let's go!", "success");
    } catch (e) {
      if (e.message.includes("Already clocked on")) {
        try {
          const shiftData = await api("/driver/shift", {}, token);
          setShift(shiftData);
          setScreen("app");
        } catch (e2) { toast(e2.message, "error"); }
      } else {
        toast(e.message, "error");
      }
    } finally {
      setClockLoading(false);
    }
  };

  const handleClockOff = () => {
    localStorage.removeItem("driver_session");
    setScreen("login");
    setToken(null);
    setUser(null);
    setShift(null);
    setSafetyChecklist([]);
    setOdometerStart(null);
  };

  switch (screen) {
    case "login":
      return <PinLogin onLogin={handleLogin} />;
    case "safety":
      return <SafetyChecklist onConfirm={handleSafetyConfirm} driverName={user?.full_name || "Driver"} />;
    case "odometer":
      return <OdometerEntry onConfirm={handleOdometerConfirm} />;
    case "truck":
      return <TruckSelect trucks={trucks} defaultTruck={defaultTruck} onSelect={handleTruckSelect} loading={clockLoading} />;
    case "app":
      return <DriverApp user={user} token={token} shift={shift} onClockOff={handleClockOff} />;
    default:
      return <PinLogin onLogin={handleLogin} />;
  }
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(e => console.log('SW registration failed:', e));
}
</script>
</body>
</html>
