<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#07324C">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <meta name="mobile-web-app-capable" content="yes" />
  <title>Hyne Pallets — Driver App</title>
  <link rel="manifest" href="/manifest-driver.json" />
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" integrity="sha384-tMH8h3BGESGckSAVGZ82T9n90ztNXxvdwvdM6UoR56cYcf+0iGXBliJ29D+wZ/x8" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" integrity="sha384-bm7MnzvK++ykSwVJ2tynSE5TRdN+xL418osEVF2DE/L/gfWHj91J2Sphe582B1Bh" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js" integrity="sha384-AISI5AuDG6E8DeEiFMVB3rGQxhZt24OU0avMp+GMV64+tpnA3+Z6F5MT0f96iPva" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#07324C',
            'red-hp': '#ED1C24',
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin:0; padding:0; background:#F5F7FA; font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
           font-size:18px; overscroll-behavior:none; }
    html { font-size: 18px; }

    /* Pin pad */
    .pin-dot { width:18px; height:18px; border-radius:50%; border:2px solid #07324C; margin:0 8px; transition:all .15s; }
    .pin-dot.filled { background:#07324C; }
    .pin-key { width:80px; height:80px; border-radius:50%; border:2px solid #07324C; display:flex;
               align-items:center; justify-content:center; font-size:28px; font-weight:600; color:#07324C;
               cursor:pointer; user-select:none; transition:all .1s; background:white; }
    .pin-key:active { background:#07324C; color:white; transform:scale(0.95); }
    .pin-key.delete { border-color:#ED1C24; color:#ED1C24; font-size:16px; }
    .pin-key.delete:active { background:#ED1C24; color:white; }

    /* Timer pulse */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .pulse-dot { width:14px; height:14px; border-radius:50%; animation:pulse 1.5s ease-in-out infinite; display:inline-block; }

    /* Stage colors */
    .stage-waiting { background:#F59E0B; }
    .stage-loading { background:#3B82F6; }
    .stage-driving { background:#10B981; }
    .stage-break { background:#6B7280; }
    .stage-bar-waiting { border-left:5px solid #F59E0B; }
    .stage-bar-loading { border-left:5px solid #3B82F6; }
    .stage-bar-driving { border-left:5px solid #10B981; }
    .stage-bar-break { border-left:5px solid #6B7280; }

    /* Delivery card stripes */
    .card-pending { border-left:5px solid #9CA3AF; }
    .card-loaded { border-left:5px solid #3B82F6; }
    .card-in_transit { border-left:5px solid #10B981; }
    .card-delivered { border-left:5px solid #059669; }
    .card-collected { border-left:5px solid #8B5CF6; }

    /* Toast */
    .toast-container { position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:8px; }
    .toast { padding:12px 20px; border-radius:10px; color:white; font-size:16px; font-weight:500;
             animation:slideIn .3s ease; min-width:280px; text-align:center; box-shadow:0 4px 12px rgba(0,0,0,.2); }
    .toast-success { background:#059669; }
    .toast-error { background:#DC2626; }
    .toast-info { background:#07324C; }
    @keyframes slideIn { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }

    /* Checkbox */
    .safety-check { width:28px; height:28px; accent-color:#07324C; flex-shrink:0; }

    /* Bottom action button */
    .action-btn { position:fixed; bottom:80px; left:16px; right:16px; z-index:50; }
    .action-btn button { width:100%; padding:20px; border-radius:16px; font-size:20px; font-weight:700;
                         color:white; border:none; cursor:pointer; transition:all .15s; box-shadow:0 4px 16px rgba(0,0,0,.2); }
    .action-btn button:active { transform:scale(0.98); }
    .action-btn button:disabled { opacity:.4; cursor:not-allowed; }

    /* Tabs */
    .tab-bar { position:fixed; bottom:0; left:0; right:0; background:white; display:flex;
               border-top:2px solid #E5E7EB; z-index:50; }
    .tab-bar button { flex:1; padding:14px 0 10px; text-align:center; border:none; background:none;
                      font-size:13px; font-weight:600; color:#9CA3AF; cursor:pointer; }
    .tab-bar button.active { color:#07324C; border-top:3px solid #07324C; }

    /* Hamburger menu */
    .menu-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; }
    .menu-panel { position:fixed; top:0; right:0; bottom:0; width:280px; background:white; z-index:101;
                  box-shadow:-4px 0 20px rgba(0,0,0,.2); padding:24px; overflow-y:auto; }
    .menu-item { padding:16px 0; border-bottom:1px solid #E5E7EB; font-size:18px; color:#07324C;
                 cursor:pointer; font-weight:500; }
    .menu-item:active { color:#ED1C24; }

    /* Scrollable content area */
    .content-scroll { padding-bottom:170px; overflow-y:auto; }

    /* Stage pipeline */
    .pipeline-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .pipeline-step { flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:4px; }
    .pipeline-circle { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center;
                        font-size:13px; font-weight:700; border:2.5px solid; flex-shrink:0; }
    .pipeline-line { height:2.5px; flex:1; min-width:14px; margin-top:-18px; z-index:0; }

    /* Offline banner */
    .offline-banner { position:sticky; top:0; z-index:80; background:#DC2626; color:white; text-align:center;
                       padding:8px 16px; font-weight:700; font-size:15px; }

    /* Fatigue banner */
    .fatigue-warning { background:#F59E0B; color:white; padding:10px 16px; text-align:center; font-weight:700; font-size:15px; }
    .fatigue-critical { background:#DC2626; color:white; padding:10px 16px; text-align:center; font-weight:700; font-size:15px; }

    /* Odometer input */
    .odometer-input { font-size:48px; font-weight:700; text-align:center; width:100%; border:none; border-bottom:3px solid #07324C;
                       color:#07324C; background:transparent; outline:none; padding:8px 0; }
    .odometer-input::placeholder { color:#D1D5DB; }

    /* Photo modal */
    .photo-preview { width:100%; max-height:280px; object-fit:cover; border-radius:12px; }

    /* Modal backdrop */
    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; display:flex; align-items:flex-end; }
    .modal-sheet { background:white; border-radius:24px 24px 0 0; padding:28px 20px 40px; width:100%; max-height:92vh; overflow-y:auto; }
    .modal-center { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; }
    .modal-card { background:white; border-radius:20px; padding:28px 20px; width:100%; max-width:460px; max-height:92vh; overflow-y:auto; }

    /* Fatigue blocker */
    .fatigue-blocker { position:fixed; inset:0; background:#07324C; z-index:500; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px; }
  </style>
</head>
<body>
<div id="root"></div>
<div id="toast-container" class="toast-container"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ═══════════════════════════════════════════════════════════════
// API & HELPERS
// ═══════════════════════════════════════════════════════════════
const API = "/api";
const api = async (path, options = {}, token = null) => {
  const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
  if (token) headers["Authorization"] = `Bearer ${token}`;
  let url = `${API}${path}`;
  if (token && !headers["Authorization"]) {
    url += (url.includes("?") ? "&" : "?") + `_token=${encodeURIComponent(token)}`;
  }
  const res = await fetch(url, { ...options, headers });
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); } catch { data = { error: text }; }
  if (res.status === 401) { localStorage.removeItem('driver_session'); window.location.reload(); throw new Error('Session expired'); }
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
};

const toast = (msg, type = "info") => {
  const el = document.createElement("div");
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById("toast-container").appendChild(el);
  setTimeout(() => el.remove(), 3500);
};

const fmtTime = (seconds) => {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  if (h > 0) return `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
};

const fmtMins = (mins) => {
  if (!mins) return "—";
  const h = Math.floor(mins / 60);
  const m = Math.round(mins % 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
};

const STAGE_LABELS = {
  waiting_to_load: "Waiting to Load",
  being_loaded: "Being Loaded",
  tie_down: "Tie Down",
  driving_to_customer: "Driving to Customer",
  waiting_at_customer: "Waiting at Customer",
  being_unloaded: "Being Unloaded",
  driving_return: "Driving Return",
  break: "On Break",
  being_loaded_at_customer: "Being Loaded (Customer)",
  being_unloaded_at_depot: "Being Unloaded (Depot)",
};

const STAGE_TYPE = (stage) => {
  if (stage === "break") return "break";
  if (stage?.includes("waiting")) return "waiting";
  if (stage?.includes("loaded") || stage?.includes("loading") || stage?.includes("unload") || stage === "tie_down") return "loading";
  if (stage?.includes("driving")) return "driving";
  return "waiting";
};

const STAGE_COLOR_CLASS = (stage) => {
  const t = STAGE_TYPE(stage);
  return { waiting: "stage-waiting", loading: "stage-loading", driving: "stage-driving", break: "stage-break" }[t] || "stage-waiting";
};

const STAGE_BAR_CLASS = (stage) => {
  const t = STAGE_TYPE(stage);
  return { waiting: "stage-bar-waiting", loading: "stage-bar-loading", driving: "stage-bar-driving", break: "stage-bar-break" }[t] || "stage-bar-waiting";
};

const STAGE_BG = (stage) => {
  const t = STAGE_TYPE(stage);
  return { waiting: "#F59E0B", loading: "#3B82F6", driving: "#10B981", break: "#6B7280" }[t] || "#F59E0B";
};

// Delivery stage pipelines
const DELIVERY_STAGES = [
  "waiting_to_load", "being_loaded", "tie_down",
  "driving_to_customer", "waiting_at_customer", "being_unloaded", "driving_return"
];
const COLLECTION_STAGES = [
  "driving_to_customer", "waiting_at_customer", "being_loaded_at_customer",
  "tie_down", "driving_return", "being_unloaded_at_depot"
];

// Enhanced getLocation — also captures accuracy
const getLocation = () => new Promise((resolve) => {
  if (!navigator.geolocation) return resolve({ lat: null, lng: null, accuracy: null });
  navigator.geolocation.getCurrentPosition(
    (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy }),
    () => resolve({ lat: null, lng: null, accuracy: null }),
    { timeout: 5000, enableHighAccuracy: false }
  );
});

// UUID generator for offline queue
const generateUUID = () => {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
    const r = Math.random() * 16 | 0;
    const v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
};

// Offline queue helpers
const queueOfflineAction = (action) => {
  const queue = JSON.parse(localStorage.getItem("offline_queue") || "[]");
  queue.push({ id: generateUUID(), queued_at: new Date().toISOString(), ...action });
  localStorage.setItem("offline_queue", JSON.stringify(queue));
};

const flushOfflineQueue = async (token) => {
  const queue = JSON.parse(localStorage.getItem("offline_queue") || "[]");
  if (queue.length === 0) return;
  try {
    await api("/driver/sync", { method: "POST", body: JSON.stringify({ actions: queue }) }, token);
    localStorage.removeItem("offline_queue");
    toast(`Synced ${queue.length} offline action${queue.length > 1 ? "s" : ""}`, "success");
  } catch (e) {
    console.warn("Offline sync failed:", e);
  }
};

// Image resize helper for photo compression
const resizeImage = (file, maxWidth = 800) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = (evt) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", 0.75));
    };
    img.onerror = reject;
    img.src = evt.target.result;
  };
  reader.onerror = reject;
  reader.readAsDataURL(file);
});

// ═══════════════════════════════════════════════════════════════
// PIN LOGIN SCREEN
// ═══════════════════════════════════════════════════════════════
const PinLogin = ({ onLogin }) => {
  const [pin, setPin] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const addDigit = (d) => {
    if (pin.length >= 6) return;
    const newPin = pin + d;
    setPin(newPin);
    setError("");
    if (newPin.length === 6) {
      doLogin(newPin);
    }
  };

  const doLogin = async (p) => {
    setLoading(true);
    try {
      const data = await api("/driver/pin-login", {
        method: "POST",
        body: JSON.stringify({ pin: p }),
      });
      onLogin(data);
    } catch (e) {
      setError("Invalid PIN — try again");
      setPin("");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="min-h-screen flex flex-col items-center justify-center px-6" style={{ background: "linear-gradient(180deg, #07324C 0%, #0A4A6E 100%)" }}>
      <div className="mb-6 text-center">
        <div className="inline-flex items-center gap-3 mb-2">
          <div style={{ width:40, height:40, background:"#ED1C24", clipPath:"polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)" }} />
          <span className="text-white text-3xl font-bold tracking-wide">HYNE PALLETS</span>
        </div>
        <p className="text-white/60 text-base">Express Pallets &amp; Crates — Narangba</p>
        <p className="text-white/80 text-xl mt-4 font-semibold">Driver Login</p>
      </div>

      <div className="flex mb-8">
        {[0,1,2,3,4,5].map(i => (
          <div key={i} className={`pin-dot ${i < pin.length ? "filled" : ""}`}
               style={{ borderColor: error ? "#ED1C24" : "white", background: i < pin.length ? "white" : "transparent" }} />
        ))}
      </div>

      {error && <p className="text-red-400 mb-4 text-base font-medium">{error}</p>}
      {loading && <p className="text-white/70 mb-4">Logging in...</p>}

      <div className="grid grid-cols-3 gap-4">
        {[1,2,3,4,5,6,7,8,9,null,0,"del"].map((k, i) => (
          k === null ? <div key={i} /> :
          k === "del" ? (
            <button key={i} className="pin-key delete" style={{ borderColor:"#ED1C24", color:"#ED1C24", background:"rgba(255,255,255,.95)" }}
                    onClick={() => { setPin(pin.slice(0,-1)); setError(""); }}>
              &#9003;
            </button>
          ) : (
            <button key={i} className="pin-key" style={{ background:"rgba(255,255,255,.95)" }}
                    onClick={() => addDigit(String(k))}>
              {k}
            </button>
          )
        ))}
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// SAFETY CHECKLIST — fetches dynamic items from API
// ═══════════════════════════════════════════════════════════════
const SafetyChecklist = ({ onConfirm, driverName }) => {
  const [items, setItems] = useState([]);
  const [checks, setChecks] = useState({});
  const [loadingItems, setLoadingItems] = useState(true);

  useEffect(() => {
    const fetchItems = async () => {
      try {
        const data = await api("/driver/safety-checklist-items");
        if (data && data.length > 0) {
          setItems(data);
        } else {
          // Fallback static items
          setItems([
            { id: "walkaround", item_text: "Vehicle walkaround inspection complete" },
            { id: "restraints", item_text: "Load restraint equipment checked" },
            { id: "ppe", item_text: "PPE worn (hi-vis, steel caps)" },
            { id: "fit", item_text: "Fit for duty (no fatigue, no impairment)" },
            { id: "firstaid", item_text: "First aid kit present" },
            { id: "fire", item_text: "Fire extinguisher present" },
          ]);
        }
      } catch (e) {
        // Use fallback if API fails
        setItems([
          { id: "walkaround", item_text: "Vehicle walkaround inspection complete" },
          { id: "restraints", item_text: "Load restraint equipment checked" },
          { id: "ppe", item_text: "PPE worn (hi-vis, steel caps)" },
          { id: "fit", item_text: "Fit for duty (no fatigue, no impairment)" },
          { id: "firstaid", item_text: "First aid kit present" },
          { id: "fire", item_text: "Fire extinguisher present" },
        ]);
      } finally {
        setLoadingItems(false);
      }
    };
    fetchItems();
  }, []);

  const allChecked = items.length > 0 && items.every(item => checks[item.id]);

  const handleConfirm = () => {
    const checklist = items.map(item => ({
      item_id: item.id,
      item_text: item.item_text,
      checked: !!checks[item.id],
    }));
    onConfirm(checklist);
  };

  if (loadingItems) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-white">
        <div className="text-center">
          <div className="animate-spin w-12 h-12 border-4 border-navy border-t-transparent rounded-full mx-auto mb-4"></div>
          <p className="text-gray-500">Loading checklist...</p>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen flex flex-col items-center justify-center px-6 bg-white">
      <div className="w-full max-w-md">
        <div className="text-center mb-6">
          <div className="w-16 h-16 rounded-full bg-amber-100 flex items-center justify-center mx-auto mb-3">
            <span className="text-3xl">⚠️</span>
          </div>
          <h2 className="text-2xl font-bold text-navy">Pre-Trip Safety Check</h2>
          <p className="text-gray-500 mt-1">G'day {driverName} — tick all items before starting</p>
        </div>

        <div className="space-y-3 mb-8">
          {items.map(item => (
            <label key={item.id} className="flex items-center gap-4 p-4 bg-gray-50 rounded-xl cursor-pointer"
                   style={{ border: checks[item.id] ? "2px solid #07324C" : "2px solid transparent" }}>
              <input type="checkbox" className="safety-check" checked={!!checks[item.id]}
                     onChange={(e) => setChecks({ ...checks, [item.id]: e.target.checked })} />
              <span className="text-lg" style={{ color: checks[item.id] ? "#07324C" : "#6B7280" }}>{item.item_text}</span>
            </label>
          ))}
        </div>

        <button onClick={handleConfirm} disabled={!allChecked}
                className="w-full py-5 rounded-2xl text-xl font-bold text-white transition-all"
                style={{ background: allChecked ? "#07324C" : "#D1D5DB", boxShadow: allChecked ? "0 4px 16px rgba(7,50,76,.3)" : "none" }}>
          Confirm &amp; Continue
        </button>
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// ODOMETER ENTRY — NEW
// ═══════════════════════════════════════════════════════════════
const OdometerEntry = ({ onConfirm }) => {
  const [value, setValue] = useState("");
  const [skipped, setSkipped] = useState(false);

  const handleSubmit = () => {
    const num = value ? parseInt(value.replace(/\D/g, ""), 10) : null;
    onConfirm(num);
  };

  const handleSkip = () => {
    onConfirm(null);
  };

  return (
    <div className="min-h-screen flex flex-col items-center justify-center px-6 bg-white">
      <div className="w-full max-w-md">
        <div className="text-center mb-8">
          <div className="w-16 h-16 rounded-full bg-blue-100 flex items-center justify-center mx-auto mb-3">
            <span className="text-3xl">🚛</span>
          </div>
          <h2 className="text-2xl font-bold text-navy">Enter Starting Odometer</h2>
          <p className="text-gray-500 mt-1">Record the odometer reading before your shift</p>
        </div>

        <div className="mb-3 text-center">
          <input
            type="number"
            inputMode="numeric"
            pattern="[0-9]*"
            className="odometer-input"
            placeholder="000000"
            value={value}
            onChange={(e) => setValue(e.target.value)}
            autoFocus
          />
          <p className="text-gray-400 text-sm mt-2">km</p>
        </div>

        <button
          onClick={handleSubmit}
          disabled={value === '' || value === undefined || value === null}
          className="w-full py-5 rounded-2xl text-xl font-bold text-white mb-4 transition-all"
          style={{ background: value ? "#07324C" : "#D1D5DB", boxShadow: value ? "0 4px 16px rgba(7,50,76,.3)" : "none" }}>
          Confirm Odometer
        </button>

        <button
          onClick={handleSkip}
          className="w-full py-4 rounded-2xl text-lg font-semibold text-gray-500 border-2 border-gray-200 bg-white transition-all">
          I don't have odometer access
        </button>
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// TRUCK SELECT
// ═══════════════════════════════════════════════════════════════
const TruckSelect = ({ trucks, defaultTruck, onSelect, loading }) => {
  const [selected, setSelected] = useState(defaultTruck?.id || null);

  return (

// STAGE PIPELINE — NEW horizontal step indicator
// ═══════════════════════════════════════════════════════════════
const StagePipeline = ({ stages, currentStage, completedStages }) => {
  if (!stages || stages.length === 0) return null;

  const currentIdx = currentStage ? stages.indexOf(currentStage) : -1;

  return (
    <div className="bg-white px-3 py-3 border-b border-gray-100">
      <div className="pipeline-scroll">
        <div className="flex items-center" style={{ paddingBottom: 2, minWidth: stages.length * 72 }}>
          {stages.map((stage, i) => {
            const isDone = completedStages ? completedStages.includes(stage) : (currentIdx > i);
            const isActive = stage === currentStage;
            const isUpcoming = !isDone && !isActive;

            let circleStyle, circleTextStyle, lineStyle;
            if (isDone) {
              circleStyle = { background: "#059669", borderColor: "#059669" };
              circleTextStyle = { color: "white" };
            } else if (isActive) {
              circleStyle = { background: STAGE_BG(stage), borderColor: STAGE_BG(stage) };
              circleTextStyle = { color: "white" };
            } else {
              circleStyle = { background: "white", borderColor: "#D1D5DB" };
              circleTextStyle = { color: "#9CA3AF" };
            }
            lineStyle = { background: isDone ? "#059669" : "#E5E7EB" };

            const shortLabels = {
              waiting_to_load: "Wait",
              being_loaded: "Load",
              tie_down: "Tie",
              driving_to_customer: "Drive",
              waiting_at_customer: "Wait@",
              being_unloaded: "Unload",
              driving_return: "Return",
              being_loaded_at_customer: "Load@",
              being_unloaded_at_depot: "Depot",
            };

            return (
              <React.Fragment key={stage}>
                <div className="pipeline-step" style={{ minWidth: 56 }}>
                  <div className="pipeline-circle" style={circleStyle}>
                    <span style={circleTextStyle}>
                      {isDone ? "✓" : String(i + 1)}
                    </span>
                  </div>
                  <span style={{ fontSize: 10, color: isActive ? STAGE_BG(stage) : (isDone ? "#059669" : "#9CA3AF"),
                                  fontWeight: isActive ? 700 : 500, textAlign: "center", lineHeight: 1.2,
                                  whiteSpace: "nowrap", marginTop: 2 }}>
                    {shortLabels[stage] || stage}
                  </span>
                </div>
                {i < stages.length - 1 && (
                  <div className="pipeline-line" style={lineStyle} />
                )}
              </React.Fragment>
            );
          })}
        </div>
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// TIMER DISPLAY — full-width bar with pulsing dot
// ═══════════════════════════════════════════════════════════════
const TimerDisplay = ({ stage, startedAt, isBreak }) => {
  const [elapsed, setElapsed] = useState(0);

  useEffect(() => {
    if (!startedAt) { setElapsed(0); return; }
    const start = new Date(startedAt).getTime();
    const tick = () => setElapsed(Math.floor((Date.now() - start) / 1000));
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [startedAt]);

  const stageLabel = isBreak ? "On Break" : (STAGE_LABELS[stage] || stage || "Ready");
  const bg = isBreak ? "#6B7280" : STAGE_BG(stage);

  return (
    <div className="w-full px-4 py-5 text-center text-white" style={{ background: bg }}>
      <div className="flex items-center justify-center gap-3 mb-2">
        {startedAt && <div className="pulse-dot" style={{ background: "white" }} />}
        <span className="text-lg font-semibold uppercase tracking-wider">{stageLabel}</span>
      </div>
      <div className="text-5xl font-mono font-bold tracking-wider">
        {startedAt ? fmtTime(elapsed) : "--:--"}
      </div>
    </div>
  );
};

      onConfirm({ odometer: num, manual_km: null });
    } else {

  return (
    <div className="modal-backdrop">

        <h2 className="text-xl font-bold text-navy mb-5 text-center">{title || "Odometer Reading"}</h2>

                  className="flex-1 py-3 rounded-xl font-semibold text-base transition-all"
                  style={{ background: mode === "odometer" ? "#07324C" : "#F3F4F6",
                           color: mode === "odometer" ? "white" : "#6B7280" }}>
            Odometer
          </button>
          <button onClick={() => setMode("manual")}
                  className="flex-1 py-3 rounded-xl font-semibold text-base transition-all"
                  style={{ background: mode === "manual" ? "#07324C" : "#F3F4F6",
                           color: mode === "manual" ? "white" : "#6B7280" }}>

        </div>

          <div className="mb-5 text-center">

              type="number"
              inputMode="numeric"

              className="odometer-input"

              value={value}
              onChange={(e) => setValue(e.target.value)}

            <p className="text-gray-400 text-sm mt-1">Enter current odometer reading (km)</p>

          <div className="mb-5 text-center">

          Skip

      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// SIGNATURE CAPTURE
// ═══════════════════════════════════════════════════════════════
const SignatureCapture = ({ onConfirm, onSkip }) => {
  const canvasRef = useRef(null);
  const [drawing, setDrawing] = useState(false);
  const [hasSignature, setHasSignature] = useState(false);
  const [showPlaceholder, setShowPlaceholder] = useState(true);
  const lastPos = useRef(null);

  const getPos = (e, canvas) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    if (e.touches && e.touches.length > 0) {
      return {
        x: (e.touches[0].clientX - rect.left) * scaleX,
        y: (e.touches[0].clientY - rect.top) * scaleY,
      };
    }
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY,
    };
  };

  const startDraw = (e) => {
    e.preventDefault();
    const canvas = canvasRef.current;
    if (!canvas) return;
    setDrawing(true);
    setShowPlaceholder(false);
    setHasSignature(true);
    const pos = getPos(e, canvas);
    lastPos.current = pos;
    const ctx = canvas.getContext('2d');
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 1, 0, Math.PI * 2);
    ctx.fillStyle = '#07324C';
    ctx.fill();
  };

  const draw = (e) => {
    e.preventDefault();
    if (!drawing) return;
    const canvas = canvasRef.current;
    if (!canvas) return;
    const pos = getPos(e, canvas);
    const ctx = canvas.getContext('2d');
    ctx.beginPath();
    ctx.moveTo(lastPos.current.x, lastPos.current.y);
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = '#07324C';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
    lastPos.current = pos;
  };

  const endDraw = (e) => {
    e.preventDefault();
    setDrawing(false);
    lastPos.current = null;
  };

  const clearCanvas = () => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    setHasSignature(false);
    setShowPlaceholder(true);
  };

  const acceptSignature = () => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const dataUrl = canvas.toDataURL('image/png');
    onConfirm(dataUrl);
  };

  return (
    <div className="modal-backdrop">
      <div className="modal-sheet">
        <h2 className="text-xl font-bold text-navy mb-1 text-center">Customer Signature</h2>
        <p className="text-gray-500 text-sm text-center mb-4">Sign below to confirm delivery</p>

        <div style={{ position: 'relative', width: '100%', marginBottom: 16 }}>
          <canvas
            ref={canvasRef}
            width={600}
            height={220}
            style={{
              width: '100%',
              height: 'auto',
              border: '2px solid #D1D5DB',
              borderRadius: 12,
              background: '#F9FAFB',
              display: 'block',
              touchAction: 'none',
              cursor: 'crosshair',
            }}
            onMouseDown={startDraw}
            onMouseMove={draw}
            onMouseUp={endDraw}
            onMouseLeave={endDraw}
            onTouchStart={startDraw}
            onTouchMove={draw}
            onTouchEnd={endDraw}
          />
          {showPlaceholder && (
            <div style={{
              position: 'absolute',
              top: '50%',
              left: '50%',
              transform: 'translate(-50%, -50%)',
              color: '#9CA3AF',
              fontSize: 16,
              fontStyle: 'italic',
              pointerEvents: 'none',
              userSelect: 'none',
            }}>
              Sign here
            </div>
          )}
        </div>

        <div className="flex gap-3 mb-3">
          <button
            onClick={clearCanvas}
            className="flex-1 py-4 rounded-xl font-semibold text-gray-600 border-2 border-gray-200 bg-white text-base">
            Clear
          </button>
          <button
            onClick={acceptSignature}
            disabled={!hasSignature}
            className="flex-1 py-4 rounded-xl font-bold text-white text-base"
            style={{ background: hasSignature ? '#07324C' : '#9CA3AF' }}>
            Accept Signature
          </button>
        </div>

        <button
          onClick={onSkip}
          className="w-full py-4 rounded-2xl text-lg text-gray-500 border-2 border-gray-200 bg-white">
          Skip
        </button>
      </div>
    </div>
  );
};

        <div className="text-6xl mb-6">🚨</div>
        <h2 className="text-3xl font-black mb-4 uppercase tracking-wide">
          {isMaxShift ? "Maximum Shift Reached" : "Mandatory Break Required"}
        </h2>
        <p className="text-white/80 text-lg mb-8">
          {isMaxShift
            ? "You have reached the maximum shift duration. You must clock off now."
            : "You must take a break before continuing. This is a legal requirement."}
        </p>

        {isMaxShift ? (
          <button onClick={onClockOff}
                  className="w-full py-6 rounded-2xl text-xl font-bold text-white"
                  style={{ background: "#ED1C24", boxShadow: "0 4px 20px rgba(237,28,36,.4)" }}>
            Clock Off Now
          </button>
        ) : (
          <button onClick={onBreak}
                  className="w-full py-6 rounded-2xl text-xl font-bold text-navy"
                  style={{ background: "white", boxShadow: "0 4px 20px rgba(0,0,0,.2)" }}>
            ☕ Start Mandatory Break
          </button>
        )}
      </div>
    </div>
  );
};

// LOGBOOK TAB — NEW
// ═══════════════════════════════════════════════════════════════
const LOGBOOK_EVENT_TYPES = [
  { value: "depart_depot", label: "Depart Depot" },
  { value: "arrive_customer", label: "Arrive Customer" },
  { value: "depart_customer", label: "Depart Customer" },
  { value: "return_depot", label: "Return to Depot" },
  { value: "fuel_stop", label: "Fuel Stop" },
  { value: "rest_break", label: "Rest Break" },
  { value: "inspection", label: "Inspection" },
  { value: "other", label: "Other" },
];

const LOGBOOK_ICONS = {
  depart_depot: "🏭",
  arrive_customer: "📍",
  depart_customer: "🚛",
  return_depot: "🏠",
  fuel_stop: "⛽",
  rest_break: "☕",
  inspection: "🔍",
  other: "📝",
};

const LogbookTab = ({ shift, token }) => {
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [eventType, setEventType] = useState("other");
  const [odometer, setOdometer] = useState("");
  const [notes, setNotes] = useState("");
  const [submitting, setSubmitting] = useState(false);

  const loadEntries = async () => {
    try {
      const data = await api(`/driver/logbook?shift_id=${shift.id}`, {}, token);
      setEntries(data || []);
    } catch (e) {
      console.error("Logbook load error:", e);
    } finally {
      setLoading(false);
    }
  };

  useEffect(() => { loadEntries(); }, [shift.id]);

  const handleAddEntry = async () => {
    setSubmitting(true);
    try {
      const loc = await getLocation();
      await api("/driver/logbook", {
        method: "POST",
        body: JSON.stringify({
          shift_id: shift.id,
          event_type: eventType,
          odometer_reading: odometer ? parseInt(odometer, 10) : null,
          lat: loc.lat,
          lng: loc.lng,
          notes: notes.trim() || null,
        }),
      }, token);
      toast("Logbook entry added", "success");
      setShowForm(false);
      setOdometer("");
      setNotes("");
      setEventType("other");
      loadEntries();
    } catch (e) {
      toast(e.message, "error");
    } finally {
      setSubmitting(false);
    }
  };

  const fmtDateTime = (dt) => {
    if (!dt) return "—";
    return new Date(dt).toLocaleTimeString("en-AU", { hour: "2-digit", minute: "2-digit" });
  };

  return (
    <div className="px-4 pb-4">
      <div className="flex items-center justify-between mb-4 pt-3">
        <h3 className="text-lg font-bold text-navy">Logbook</h3>
        <button onClick={() => setShowForm(true)}
                className="px-4 py-2 rounded-xl font-semibold text-white text-base"
                style={{ background: "#07324C" }}>
          + Add Entry
        </button>
      </div>

      {loading ? (
        <div className="text-center py-8 text-gray-400">Loading...</div>
      ) : entries.length === 0 ? (
        <div className="text-center py-12">
          <div className="text-4xl mb-3">📓</div>
          <p className="text-gray-500">No logbook entries yet</p>
          <p className="text-gray-400 text-sm mt-1">Tap "Add Entry" to record an event</p>
        </div>
      ) : (
        <div className="space-y-2">
          {entries.map((entry, i) => (
            <div key={i} className="bg-white rounded-xl p-4 border border-gray-100 shadow-sm">
              <div className="flex items-start gap-3">
                <span className="text-2xl">{LOGBOOK_ICONS[entry.event_type] || "📝"}</span>
                <div className="flex-1">
                  <div className="flex items-center justify-between">
                    <span className="font-bold text-navy text-base">
                      {LOGBOOK_EVENT_TYPES.find(t => t.value === entry.event_type)?.label || entry.event_type}
                    </span>
                    <span className="text-gray-400 text-sm font-mono">{fmtDateTime(entry.created_at)}</span>
                  </div>
                  {entry.odometer_reading && (
                    <div className="text-sm text-gray-500 mt-1">Odo: {entry.odometer_reading.toLocaleString()} km</div>
                  )}
                  {entry.manual_km && (
                    <div className="text-sm text-gray-500 mt-1">Distance: {entry.manual_km} km</div>
                  )}
                  {entry.notes && (
                    <div className="text-sm text-gray-700 mt-1">{entry.notes}</div>
                  )}
                  {entry.location_description && (
                    <div className="text-xs text-gray-400 mt-1">📍 {entry.location_description}</div>
                  )}
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Add entry form modal */}
      {showForm && (
        <div className="modal-backdrop">
          <div className="modal-sheet">
            <div className="flex items-center justify-between mb-5">
              <h3 className="text-xl font-bold text-navy">Add Logbook Entry</h3>
              <button onClick={() => setShowForm(false)} className="text-gray-400 text-3xl">&times;</button>
            </div>

            <label className="block font-semibold text-navy mb-2">Event Type</label>
            <select value={eventType} onChange={e => setEventType(e.target.value)}
                    className="w-full p-4 rounded-xl border-2 border-gray-200 text-lg text-navy mb-4"
                    style={{ background: "white" }}>
              {LOGBOOK_EVENT_TYPES.map(t => (
                <option key={t.value} value={t.value}>{t.label}</option>
              ))}
            </select>

            <label className="block font-semibold text-navy mb-2">Odometer (optional)</label>
            <input type="number" inputMode="numeric" placeholder="km reading"
                   value={odometer} onChange={e => setOdometer(e.target.value)}
                   className="w-full p-4 rounded-xl border-2 border-gray-200 text-lg text-navy mb-4" />

            <label className="block font-semibold text-navy mb-2">Notes (optional)</label>
            <textarea rows={3} placeholder="Any notes..."
                      value={notes} onChange={e => setNotes(e.target.value)}
                      className="w-full p-4 rounded-xl border-2 border-gray-200 text-lg text-navy mb-5"
                      style={{ resize: "vertical" }} />

            <button onClick={handleAddEntry} disabled={submitting}
                    className="w-full py-5 rounded-2xl text-xl font-bold text-white"
                    style={{ background: "#07324C" }}>
              {submitting ? "Saving..." : "Save Entry"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
};

// SHIFT SUMMARY — UPGRADED with costs and odometer
// ═══════════════════════════════════════════════════════════════
const ShiftSummary = ({ shift, stages, costs, onClose }) => {
  const [shiftCostBreakdown, setShiftCostBreakdown] = useState(null);
  const [loadingCosts, setLoadingCosts] = useState(false);

  useEffect(() => {
    if (shift?.id) {
      setLoadingCosts(true);
      api(`/driver/cost-breakdown?shift_id=${shift.id}`, {}, token)
        .then(data => setShiftCostBreakdown(data))
        .catch(() => {})
        .finally(() => setLoadingCosts(false));
    }
  }, [shift?.id]);

  const totalDriving = stages.filter(s => s.stage?.includes("driving")).reduce((a, s) => a + (s.duration_minutes || 0), 0);
  const totalWaiting = stages.filter(s => s.stage?.includes("waiting")).reduce((a, s) => a + (s.duration_minutes || 0), 0);
  const totalLoading = stages.filter(s => s.stage?.includes("load") || s.stage === "tie_down" || s.stage?.includes("unload")).reduce((a, s) => a + (s.duration_minutes || 0), 0);
  const totalBreak = stages.filter(s => s.stage === "break").reduce((a, s) => a + (s.duration_minutes || 0), 0);

  const odometerStart = shift?.odometer_start;
  const odometerEnd = shift?.odometer_end;
  const kmDriven = odometerStart && odometerEnd ? odometerEnd - odometerStart : null;

  return (
    <div className="fixed inset-0 bg-white z-50 overflow-y-auto">
      <div className="p-6 max-w-md mx-auto">
        <div className="flex items-center justify-between mb-6">
          <h2 className="text-2xl font-bold text-navy">Shift Summary</h2>
          <button onClick={onClose} className="text-gray-400 text-3xl w-10 h-10 flex items-center justify-center">&times;</button>
        </div>

        <div className="bg-navy text-white rounded-xl p-5 mb-4">
          <div className="text-white/70 text-sm">Total Shift Duration</div>
          <div className="text-3xl font-bold">{shift?.total_hours ? `${shift.total_hours.toFixed(1)} hrs` : "—"}</div>
          {kmDriven != null && (
            <div className="text-white/80 mt-1 text-sm">Total distance: {kmDriven.toLocaleString()} km</div>
          )}
        </div>

        {(odometerStart || odometerEnd) && (
          <div className="bg-blue-50 rounded-xl p-4 mb-4">
            <div className="text-sm font-semibold text-blue-700 mb-2">Odometer</div>
            <div className="flex justify-between">
              {odometerStart && <div><div className="text-xs text-blue-500">Start</div><div className="font-bold text-blue-900">{odometerStart.toLocaleString()} km</div></div>}
              {odometerEnd && <div className="text-right"><div className="text-xs text-blue-500">End</div><div className="font-bold text-blue-900">{odometerEnd.toLocaleString()} km</div></div>}
            </div>
          </div>
        )}

        <div className="grid grid-cols-2 gap-3 mb-6">
          <div className="bg-green-50 rounded-xl p-4">
            <div className="text-sm text-green-600">Driving</div>
            <div className="text-xl font-bold text-green-800">{fmtMins(totalDriving)}</div>
          </div>
          <div className="bg-blue-50 rounded-xl p-4">
            <div className="text-sm text-blue-600">Loading/Unloading</div>
            <div className="text-xl font-bold text-blue-800">{fmtMins(totalLoading)}</div>
          </div>
          <div className="bg-amber-50 rounded-xl p-4">
            <div className="text-sm text-amber-600">Waiting</div>
            <div className="text-xl font-bold text-amber-800">{fmtMins(totalWaiting)}</div>
          </div>
          <div className="bg-gray-100 rounded-xl p-4">
            <div className="text-sm text-gray-500">Breaks</div>
            <div className="text-xl font-bold text-gray-700">{fmtMins(totalBreak)}</div>
          </div>
        </div>

        {/* Cost breakdown from API */}
        {loadingCosts ? (
          <div className="text-center py-4 text-gray-400">Loading costs...</div>
        ) : shiftCostBreakdown ? (
          <div className="mb-6">
            <h3 className="text-lg font-bold text-navy mb-3">Shift Costs</h3>
            <div className="bg-white rounded-xl border border-gray-200 p-4">
              {[
                { label: "Driver Wages", key: "driver_cost" },
                { label: "Fuel", key: "fuel_cost" },
                { label: "Rego", key: "rego_cost" },
                { label: "Insurance", key: "insurance_cost" },
                { label: "R&M", key: "rm_cost" },
                { label: "Tyres", key: "tyre_cost" },
                { label: "Tolls", key: "toll_cost" },
              ].map(row => (
                shiftCostBreakdown[row.key] > 0 ? (
                  <div key={row.key} className="flex justify-between py-2 border-b border-gray-100 last:border-0">
                    <span className="text-gray-600">{row.label}</span>
                    <span className="font-semibold">${(shiftCostBreakdown[row.key] || 0).toFixed(2)}</span>
                  </div>
                ) : null
              ))}
              <div className="flex justify-between pt-3 mt-2 border-t-2 border-navy">
                <span className="font-bold text-navy">Total</span>
                <span className="font-bold text-navy text-lg">${(shiftCostBreakdown.total_cost || 0).toFixed(2)}</span>
              </div>
            </div>
          </div>
        ) : costs && costs.length > 0 ? (
          <div className="mb-6">
            <h3 className="text-lg font-bold text-navy mb-3">Run Costs</h3>
            {costs.map((c, i) => (
              <div key={i} className="bg-white rounded-xl border p-4 mb-2">
                <div className="flex justify-between mb-1"><span className="text-gray-600">Driver</span><span className="font-semibold">${(c.driver_cost || 0).toFixed(2)}</span></div>
                <div className="flex justify-between mb-1"><span className="text-gray-600">Fuel</span><span className="font-semibold">${(c.fuel_cost || 0).toFixed(2)}</span></div>
                <div className="flex justify-between mb-1"><span className="text-gray-600">Rego + Ins</span><span className="font-semibold">${((c.rego_cost || 0) + (c.insurance_cost || 0)).toFixed(2)}</span></div>
                <div className="flex justify-between mb-1"><span className="text-gray-600">R&M + Tyres</span><span className="font-semibold">${((c.rm_cost || 0) + (c.tyre_cost || 0)).toFixed(2)}</span></div>
                <div className="flex justify-between pt-2 border-t border-gray-200 mt-2">
                  <span className="font-bold text-navy">Total</span>
                  <span className="font-bold text-navy text-lg">${(c.total_cost || 0).toFixed(2)}</span>
                </div>
              </div>
            ))}
          </div>
        ) : null}

        <StageHistory stages={stages} />
      </div>
    </div>
  );
};

        {/* Special Instructions */}
        {stop.special_instructions && (
          <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 mb-4">
            <div className="font-bold text-amber-800 mb-1" style={{ fontSize: 15 }}>⚠ Special Instructions</div>
            <div className="text-amber-900" style={{ fontSize: 15 }}>{stop.special_instructions}</div>
          </div>
        )}

        {/* Actions */}
        {mapsUrl && (
          <a href={mapsUrl} target="_blank" rel="noreferrer"
             className="block w-full text-center font-bold text-white rounded-2xl py-4 mb-3"
             style={{ background: "#07324C", fontSize: 18, minHeight: 56, lineHeight: "24px" }}>
            🗺 Navigate to {stop.client_name || "Customer"}
          </a>
        )}
        <button onClick={onClose}
                className="w-full font-semibold text-gray-600 rounded-2xl py-3 border border-gray-200"
                style={{ fontSize: 17, minHeight: 50 }}>
          Close
        </button>
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// NEXT DELIVERY POPUP
// ═══════════════════════════════════════════════════════════════
const NextDeliveryPopup = ({ nextStop, runNumber, totalRuns, onNavigate, onSkip, onClose }) => {
  const mapsUrl = nextStop?.client_address
    ? `https://maps.google.com/?q=${encodeURIComponent(nextStop.client_address)}`
    : (nextStop?.street_address
        ? `https://maps.google.com/?q=${encodeURIComponent([nextStop.street_address, nextStop.suburb, nextStop.state, nextStop.postcode].filter(Boolean).join(", "))}`
        : null);

  return (
    <div className="modal-center">
      <div className="modal-card" style={{ textAlign: "center", maxWidth: 420 }}>
        <div style={{ fontSize: 52, marginBottom: 8 }}>✅</div>
        <div className="font-bold text-navy mb-1" style={{ fontSize: 22 }}>Delivery Complete!</div>
        {nextStop ? (
          <>
            <div className="text-gray-500 mb-4" style={{ fontSize: 16 }}>Up next in Run {runNumber}:</div>
            <div className="bg-gray-50 rounded-xl p-4 mb-5 text-left">
              <div className="font-bold text-navy" style={{ fontSize: 19 }}>{nextStop.client_name || "Next Stop"}</div>
              {nextStop.client_address && (
                <div className="text-gray-600 mt-1" style={{ fontSize: 15 }}>📍 {nextStop.client_address}</div>
              )}
              {!nextStop.client_address && nextStop.street_address && (
                <div className="text-gray-600 mt-1" style={{ fontSize: 15 }}>
                  📍 {[nextStop.street_address, nextStop.suburb, nextStop.postcode].filter(Boolean).join(", ")}
                </div>
              )}
              {nextStop.items && nextStop.items.length > 0 && (
                <div className="mt-2 space-y-1">
                  {nextStop.items.map((it, i) => (
                    <div key={i} className="flex justify-between text-sm">
                      <span className="font-mono text-navy" style={{ fontSize: 14 }}>{it.sku_code || it.product_name}</span>
                      <span className="font-bold" style={{ fontSize: 14 }}>×{it.quantity}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
            {mapsUrl ? (
              <a href={mapsUrl} target="_blank" rel="noreferrer" onClick={onClose}
                 className="block w-full text-center font-bold text-white rounded-2xl py-4 mb-3"
                 style={{ background: "#07324C", fontSize: 18, minHeight: 56, lineHeight: "24px" }}>
                🗺 Navigate Now
              </a>
            ) : (
              <button onClick={onNavigate}
                      className="w-full font-bold text-white rounded-2xl py-4 mb-3"
                      style={{ background: "#07324C", fontSize: 18, minHeight: 56 }}>
                Continue to Next Stop
              </button>
            )}
            <button onClick={onSkip}
                    className="w-full font-semibold text-gray-600 rounded-2xl py-3 border border-gray-200"
                    style={{ fontSize: 17, minHeight: 50 }}>
              Skip for Now
            </button>
          </>
        ) : (
          <>
            <div className="font-bold text-green-600 mb-3" style={{ fontSize: 19 }}>Run {runNumber} Complete!</div>
            {totalRuns > runNumber ? (
              <>
                <div className="text-gray-500 mb-5" style={{ fontSize: 16 }}>Move to Run {runNumber + 1}?</div>
                <button onClick={onNavigate}
                        className="w-full font-bold text-white rounded-2xl py-4 mb-3"
                        style={{ background: "#07324C", fontSize: 18, minHeight: 56 }}>
                  Start Run {runNumber + 1}
                </button>
              </>
            ) : (
              <>
                <div className="text-gray-500 mb-5" style={{ fontSize: 16 }}>All runs complete — return to depot.</div>
                <button onClick={onClose}
                        className="w-full font-bold text-white rounded-2xl py-4 mb-3"
                        style={{ background: "#059669", fontSize: 18, minHeight: 56 }}>
                  🏁 Head Back to Depot
                </button>
              </>
            )}
            <button onClick={onSkip}
                    className="w-full font-semibold text-gray-600 rounded-2xl py-3 border border-gray-200"
                    style={{ fontSize: 17, minHeight: 50 }}>
              Dismiss
            </button>
          </>
        )}
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// RUN SHEET VIEW — Multi-Run Layout (Section 18)
// ═══════════════════════════════════════════════════════════════
const RunSheetView = ({ shift, token, onClose }) => {
  const [runData, setRunData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [confirming, setConfirming] = useState(null);    // delivery_log_id being confirmed
  const [completing, setCompleting] = useState(false);
  const [woModal, setWoModal] = useState(null);          // stop object for WO detail
  const [nextPopup, setNextPopup] = useState(null);      // { nextStop, runNumber, totalRuns }
  // stops order override per run: { runId: [stop, stop, ...] }
  const [stopsOrder, setStopsOrder] = useState({});
  // Departure in-progress per run
  const [departing, setDeparting] = useState({});

  const load = async () => {
    setLoading(true);
    try {
      const today = new Date().toISOString().split("T")[0];
      // Try v2 first, fallback to v1
      let data;
      try {
        data = await api(`/driver/runsheet-v2?truck_id=${shift.truck_id}&date=${today}`, {}, token);
      } catch {
        const v1 = await api(`/driver/runsheet?truck_id=${shift.truck_id}&date=${today}`, {}, token);
        // Wrap v1 flat stops into a single "unassigned" run for display
        data = {
          date: today,
          truck: { name: shift.truck_name || `Truck ${shift.truck_id}`, rego: shift.truck_rego || "" },
          driver: { name: "" },
          runs: [],
          unassigned_stops: v1.stops || [],
        };
      }
      setRunData(data);
      // Init stops order from load_sequence
      const initOrder = {};
      (data.runs || []).forEach(run => {
        initOrder[run.id] = [...(run.stops || [])].sort((a, b) => (a.load_sequence || 999) - (b.load_sequence || 999));
      });
      setStopsOrder(initOrder);
    } catch (e) {
      console.error("RunSheetV2 error:", e);
      toast("Failed to load run sheet", "error");
    } finally {
      setLoading(false);
    }
  };

  useEffect(() => { load(); }, [shift, token]);

  // Move stop up or down within a run
  const moveStop = async (runId, idx, direction) => {
    const current = [...(stopsOrder[runId] || [])];
    const newIdx = idx + direction;
    if (newIdx < 0 || newIdx >= current.length) return;
    const tmp = current[idx];
    current[idx] = current[newIdx];
    current[newIdx] = tmp;
    setStopsOrder(prev => ({ ...prev, [runId]: current }));
    // Persist new sequences
    const sequences = current.map((s, i) => ({ delivery_log_id: s.delivery_log_id, load_sequence: i + 1 }));
    try {
      await api("/driver/stop-sequence", { method: "PUT", body: JSON.stringify({ sequences }) }, token);
    } catch (e) {
      console.error("Sequence save error:", e);
    }
  };

  // Depart a run (marks in_transit)
  const handleDepart = async (runId, runNumber) => {
    if (departing[runId]) return;
    setDeparting(prev => ({ ...prev, [runId]: true }));
    try {
      await api(`/dispatch-runs/${runId}`, {
        method: "PUT",
        body: JSON.stringify({ status: "in_transit", departure_time: new Date().toISOString() })
      }, token);
      toast(`Run ${runNumber} departed!`, "success");
      await load();
    } catch (e) {
      toast("Could not update run status", "error");
    } finally {
      setDeparting(prev => ({ ...prev, [runId]: false }));
    }
  };

  // Mark a stop as delivered
  const handleMarkDelivered = async (stop, runId, runNumber, allRuns) => {
    if (completing) return;
    setCompleting(true);
    setConfirming(null);
    // Capture current order snapshot BEFORE reload (so we can find position)
    const currentOrder = [...(stopsOrder[runId] || [])];
    const currentIdx = currentOrder.findIndex(s => s.delivery_log_id === stop.delivery_log_id);
    try {
      await api("/driver/delivery/complete", {
        method: "POST",
        body: JSON.stringify({
          delivery_log_id: stop.delivery_log_id,
          shift_id: shift.id,
          total_km: null, // server computes from delivery_run_stages when null/falsy
        })
      }, token);
      toast(`${stop.client_name || "Stop"} delivered!`, "success");
      await load();
      // Find next pending stop after the delivered one (in same positional order)
      const pendingAfter = currentOrder.slice(currentIdx + 1).find(
        s => s.status !== "delivered" && s.status !== "collected"
      );
      const totalRuns = allRuns.length;
      setNextPopup({
        nextStop: pendingAfter || null,
        runNumber,
        totalRuns,
      });
    } catch (e) {
      toast("Failed to complete delivery", "error");
    } finally {
      setCompleting(false);
    }
  };

  if (loading) {
    return (
      <div className="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <div className="animate-spin w-12 h-12 border-4 border-t-transparent rounded-full"
             style={{ borderColor: "#07324C", borderTopColor: "transparent" }}></div>
      </div>
    );
  }

  const runs = runData?.runs || [];
  const unassigned = runData?.unassigned_stops || [];
  const truckLabel = runData?.truck?.rego
    ? `${runData.truck.name} (${runData.truck.rego})`
    : (runData?.truck?.name || shift.truck_name || `Truck ${shift.truck_id}`);
  const driverLabel = runData?.driver?.name || "";
  const totalAllStops = runs.reduce((a, r) => a + (r.total_stops || 0), 0) + unassigned.length;

  // Run status display helpers
  const runStatusLabel = (status) => {
    if (status === "in_transit") return { label: "In Transit", color: "#10B981" };
    if (status === "completed")  return { label: "Complete",   color: "#059669" };
    if (status === "loading")    return { label: "Loading",    color: "#3B82F6" };
    if (status === "cancelled")  return { label: "Cancelled",  color: "#6B7280" };
    return { label: "Planned", color: "#F59E0B" };
  };

  const stopStatusLabel = (status) => {
    if (status === "delivered")  return { label: "Delivered",   bg: "#D1FAE5", color: "#065F46" };
    if (status === "collected")  return { label: "Collected",   bg: "#EDE9FE", color: "#4C1D95" };
    if (status === "in_transit") return { label: "In Transit",  bg: "#D1FAE5", color: "#065F46" };
    if (status === "loaded")     return { label: "Loaded",      bg: "#DBEAFE", color: "#1E40AF" };
    return { label: "Pending", bg: "#F3F4F6", color: "#374151" };
  };

  const renderStop = (stop, idx, runId, runNumber, allStops, allRuns) => {
    const type = stop.delivery_type || stop.order_delivery_type || "delivery";
    const status = stop.status || "pending";
    const isDone = status === "delivered" || status === "collected";
    const ssl = stopStatusLabel(status);
    const isConfirming = confirming === stop.delivery_log_id;
    const addressParts = stop.client_address ||
      [stop.street_address, stop.suburb, stop.state, stop.postcode].filter(Boolean).join(", ");
    const mapsUrl = addressParts
      ? `https://maps.google.com/?q=${encodeURIComponent(addressParts)}`
      : null;
    const totalSiblings = allStops.length;

    return (
      <div key={stop.delivery_log_id || idx}
           style={{
             background: "white",
             borderRadius: 16,
             marginBottom: 12,
             boxShadow: "0 2px 8px rgba(0,0,0,0.08)",
             borderLeft: `5px solid ${isDone ? "#059669" : (type === "collection" ? "#8B5CF6" : "#07324C")}`,
             opacity: isDone ? 0.65 : 1,
           }}>
        {/* Stop header row */}
        <div style={{ display: "flex", alignItems: "flex-start", padding: "14px 14px 10px", gap: 12 }}>
          {/* Sequence number */}
          <div style={{
            minWidth: 40, height: 40, borderRadius: "50%",
            background: isDone ? "#059669" : "#07324C",
            display: "flex", alignItems: "center", justifyContent: "center",
            color: "white", fontWeight: 800, fontSize: 18, flexShrink: 0,
          }}>
            {isDone ? "✓" : idx + 1}
          </div>

          {/* Main info */}
          <div style={{ flex: 1, minWidth: 0 }}>
            {/* WO number — clickable */}
            <button onClick={() => setWoModal(stop)}
                    style={{
                      background: "none", border: "none", padding: 0, cursor: "pointer",
                      color: "#07324C", fontWeight: 800, fontSize: 17, textDecoration: "underline",
                      textDecorationStyle: "dotted", marginBottom: 3, display: "block", textAlign: "left",
                    }}>
              {stop.order_number || `DL-${stop.delivery_log_id}`}
            </button>
            <div style={{ fontWeight: 700, fontSize: 19, color: "#07324C", lineHeight: 1.2, marginBottom: 4 }}>
              {stop.client_name || "Unknown Customer"}
            </div>
            {addressParts && (
              <div style={{ color: "#6B7280", fontSize: 15, marginBottom: 4 }}>📍 {addressParts}</div>
            )}
            {stop.client_phone && (
              <a href={`tel:${stop.client_phone}`}
                 style={{ color: "#07324C", fontSize: 16, fontWeight: 600, display: "block", marginBottom: 4, minHeight: 32 }}>
                ☎ {stop.client_phone}
              </a>
            )}
          </div>

          {/* Type + status badges + reorder buttons */}
          <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6, flexShrink: 0 }}>
            <span style={{
              background: type === "collection" ? "#8B5CF6" : "#07324C",
              color: "white", borderRadius: 20, padding: "3px 10px", fontSize: 13, fontWeight: 700,
            }}>
              {type === "collection" ? "COLLECT" : "DELIVER"}
            </span>
            <span style={{ background: ssl.bg, color: ssl.color, borderRadius: 20, padding: "3px 10px", fontSize: 13, fontWeight: 700 }}>
              {ssl.label}
            </span>
            {/* Up/Down reorder */}
            {!isDone && (
              <div style={{ display: "flex", gap: 4 }}>
                <button onClick={() => moveStop(runId, idx, -1)}
                        disabled={idx === 0}
                        style={{
                          width: 34, height: 34, borderRadius: 8, border: "1.5px solid #D1D5DB",
                          background: idx === 0 ? "#F3F4F6" : "white",
                          color: idx === 0 ? "#D1D5DB" : "#07324C",
                          fontSize: 18, cursor: idx === 0 ? "default" : "pointer",
                          display: "flex", alignItems: "center", justifyContent: "center",
                        }}>▲</button>
                <button onClick={() => moveStop(runId, idx, 1)}
                        disabled={idx === totalSiblings - 1}
                        style={{
                          width: 34, height: 34, borderRadius: 8, border: "1.5px solid #D1D5DB",
                          background: idx === totalSiblings - 1 ? "#F3F4F6" : "white",
                          color: idx === totalSiblings - 1 ? "#D1D5DB" : "#07324C",
                          fontSize: 18, cursor: idx === totalSiblings - 1 ? "default" : "pointer",
                          display: "flex", alignItems: "center", justifyContent: "center",
                        }}>▼</button>
              </div>
            )}
          </div>
        </div>

        {/* SKU list */}
        {stop.items && stop.items.length > 0 && (
          <div style={{ margin: "0 14px 10px", background: "#F9FAFB", borderRadius: 10, padding: "8px 12px" }}>
            {stop.items.map((item, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0",
                                    borderBottom: i < stop.items.length - 1 ? "1px solid #E5E7EB" : "none" }}>
                <span style={{ fontFamily: "monospace", color: "#07324C", fontSize: 15, fontWeight: 700 }}>
                  {item.sku_code || item.product_name || "—"}
                </span>
                <span style={{ fontWeight: 800, fontSize: 16, color: "#07324C" }}>×{item.quantity}</span>
              </div>
            ))}
            <div style={{ textAlign: "right", color: "#6B7280", fontSize: 14, marginTop: 4 }}>
              Total: <strong>{stop.total_qty || 0} units</strong>
            </div>
          </div>
        )}

        {/* Special instructions */}
        {stop.special_instructions && (
          <div style={{ margin: "0 14px 10px", background: "#FFFBEB", border: "1px solid #FDE68A",
                         borderRadius: 10, padding: "8px 12px", fontSize: 15, color: "#92400E" }}>
            ⚠ {stop.special_instructions}
          </div>
        )}

        {/* Action buttons */}
        {!isDone && (
          <div style={{ padding: "0 14px 14px", display: "flex", gap: 10 }}>
            {mapsUrl && (
              <a href={mapsUrl} target="_blank" rel="noreferrer"
                 style={{
                   flex: 1, display: "flex", alignItems: "center", justifyContent: "center",
                   background: "#EFF6FF", color: "#07324C", borderRadius: 14,
                   padding: "12px", fontWeight: 700, fontSize: 16, minHeight: 52,
                   border: "2px solid #BFDBFE", textDecoration: "none",
                 }}>
                🗺 Navigate
              </a>
            )}
            {!isConfirming ? (
              <button onClick={() => setConfirming(stop.delivery_log_id)}
                      disabled={completing}
                      style={{
                        flex: 1.5, background: "#07324C", color: "white",
                        borderRadius: 14, border: "none", padding: "12px",
                        fontWeight: 700, fontSize: 16, minHeight: 52, cursor: "pointer",
                      }}>
                ✓ Mark Delivered
              </button>
            ) : (
              <div style={{ flex: 1.5, display: "flex", gap: 8 }}>
                <button onClick={() => handleMarkDelivered(stop, runId, runNumber, allRuns)}
                        disabled={completing}
                        style={{
                          flex: 1, background: "#059669", color: "white", borderRadius: 14,
                          border: "none", padding: "12px", fontWeight: 800,
                          fontSize: 16, minHeight: 52, cursor: "pointer",
                        }}>
                  {completing ? "..." : "Confirm"}
                </button>
                <button onClick={() => setConfirming(null)}
                        style={{
                          flex: 1, background: "#F3F4F6", color: "#374151", borderRadius: 14,
                          border: "none", padding: "12px", fontWeight: 700,
                          fontSize: 16, minHeight: 52, cursor: "pointer",
                        }}>
                  Cancel
                </button>
              </div>
            )}
          </div>
        )}
      </div>
    );
  };

  const renderRun = (run, allRuns) => {
    const ordered = stopsOrder[run.id] || run.stops || [];
    const allDone = ordered.length > 0 && ordered.every(s => s.status === "delivered" || s.status === "collected");
    const rsl = runStatusLabel(run.status);
    const departureStr = run.departure_time
      ? new Date(run.departure_time).toLocaleTimeString("en-AU", { hour: "2-digit", minute: "2-digit" })
      : null;
    const isInTransit = run.status === "in_transit";
    const isPlanned = run.status === "planned" || run.status === "loading";

    return (
      <div key={run.id} style={{ marginBottom: 24 }}>
        {/* Run header */}
        <div style={{
          background: "#07324C",
          borderRadius: "16px 16px 0 0",
          padding: "14px 16px",
          display: "flex", alignItems: "center", gap: 12,
        }}>
          <div style={{ flex: 1 }}>
            <div style={{ color: "white", fontWeight: 800, fontSize: 20 }}>RUN {run.run_number}</div>
            <div style={{ color: "rgba(255,255,255,0.65)", fontSize: 15, marginTop: 2 }}>
              {ordered.length} stop{ordered.length !== 1 ? "s" : ""}
              {run.driver_name ? ` · ${run.driver_name}` : ""}
              {fmtMins(run.total_estimated_minutes) !== "—" ? ` · ~${fmtMins(run.total_estimated_minutes)}` : ""}
            </div>
          </div>
          {/* Status badge */}
          <span style={{ background: rsl.color, color: "white", borderRadius: 20,
                          padding: "4px 12px", fontSize: 14, fontWeight: 700 }}>
            {allDone ? "✓ Complete" : rsl.label}
          </span>
          {/* Depart button */}
          {isPlanned && !allDone && ordered.length > 0 && (
            <button onClick={() => handleDepart(run.id, run.run_number)}
                    disabled={departing[run.id]}
                    style={{
                      background: "#ED1C24", color: "white", borderRadius: 12,
                      border: "none", padding: "10px 16px", fontWeight: 800,
                      fontSize: 16, cursor: "pointer", minHeight: 44, whiteSpace: "nowrap",
                    }}>
              {departing[run.id] ? "..." : "Depart"}
            </button>
          )}
          {isInTransit && departureStr && (
            <span style={{ color: "rgba(255,255,255,0.7)", fontSize: 14 }}>Left {departureStr}</span>
          )}
        </div>

        {/* Stops */}
        <div style={{
          background: "#F5F7FA",
          borderRadius: "0 0 16px 16px",
          padding: "12px 12px 4px",
          border: "2px solid #07324C",
          borderTop: "none",
        }}>
          {ordered.length === 0 ? (
            <div style={{ textAlign: "center", padding: "24px", color: "#9CA3AF", fontSize: 16 }}>
              No stops in this run
            </div>
          ) : (
            ordered.map((stop, idx) =>
              renderStop(stop, idx, run.id, run.run_number, ordered, allRuns)
            )
          )}
        </div>
      </div>
    );
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "#F5F7FA", zIndex: 50, overflowY: "auto" }}>
      {/* Header */}
      <div style={{
        position: "sticky", top: 0, background: "#07324C", color: "white",
        padding: "14px 16px", display: "flex", alignItems: "center", gap: 12,
        zIndex: 10, boxShadow: "0 2px 8px rgba(0,0,0,0.2)",
      }}>
        <button onClick={onClose}
                style={{
                  background: "none", border: "none", color: "white", fontSize: 28,
                  cursor: "pointer", minWidth: 44, minHeight: 44,
                  display: "flex", alignItems: "center", justifyContent: "center",
                }}>←</button>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 800, fontSize: 20 }}>Today's Runs</div>
          <div style={{ color: "rgba(255,255,255,0.7)", fontSize: 15 }}>
            {truckLabel}{driverLabel ? ` — ${driverLabel}` : ""}
          </div>
        </div>
        <button onClick={load}
                style={{
                  background: "rgba(255,255,255,0.15)", border: "none", color: "white",
                  borderRadius: 10, padding: "8px 14px", fontWeight: 700, fontSize: 15,
                  cursor: "pointer", minHeight: 44,
                }}>↻ Refresh</button>
      </div>

      {/* Summary bar */}
      <div style={{
        background: "white", borderBottom: "1px solid #E5E7EB",
        padding: "12px 16px", display: "flex", justifyContent: "space-around",
      }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 13, color: "#6B7280" }}>Runs</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: "#07324C" }}>{runs.length}</div>
        </div>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 13, color: "#6B7280" }}>Total Stops</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: "#07324C" }}>{totalAllStops}</div>
        </div>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 13, color: "#6B7280" }}>Completed</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: "#059669" }}>
            {runs.reduce((a, r) => a + (stopsOrder[r.id] || r.stops || []).filter(s => s.status === "delivered" || s.status === "collected").length, 0)
             + unassigned.filter(s => s.status === "delivered" || s.status === "collected").length
            }/{totalAllStops}
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{ padding: "16px 14px 40px" }}>
        {runs.length === 0 && unassigned.length === 0 ? (
          <div style={{ textAlign: "center", padding: "60px 20px" }}>
            <div style={{ fontSize: 56, marginBottom: 16 }}>📋</div>
            <div style={{ fontSize: 20, color: "#6B7280", fontWeight: 600 }}>No runs scheduled today</div>
            <div style={{ fontSize: 16, color: "#9CA3AF", marginTop: 8 }}>Check with dispatch for your load</div>
          </div>
        ) : (
          <>
            {runs.map(run => renderRun(run, runs))}

            {/* Unassigned stops */}
            {unassigned.length > 0 && (
              <div style={{ marginBottom: 24 }}>
                <div style={{
                  background: "#6B7280",
                  borderRadius: "16px 16px 0 0",
                  padding: "14px 16px",
                }}>
                  <div style={{ color: "white", fontWeight: 800, fontSize: 20 }}>Unassigned Stops</div>
                  <div style={{ color: "rgba(255,255,255,0.65)", fontSize: 15, marginTop: 2 }}>
                    {unassigned.length} stop{unassigned.length !== 1 ? "s" : ""} not assigned to a run
                  </div>
                </div>
                <div style={{
                  background: "#F5F7FA", borderRadius: "0 0 16px 16px",
                  padding: "12px 12px 4px",
                  border: "2px solid #6B7280", borderTop: "none",
                }}>
                  {unassigned.map((stop, idx) =>
                    renderStop(stop, idx, "unassigned", 0, unassigned, runs)
                  )}
                </div>
              </div>
            )}
          </>
        )}
      </div>

      {/* WO Detail Modal */}
      {woModal && <WODetailModal stop={woModal} onClose={() => setWoModal(null)} />}

      {/* Next Delivery Popup */}
      {nextPopup && (
        <NextDeliveryPopup
          nextStop={nextPopup.nextStop}
          runNumber={nextPopup.runNumber}
          totalRuns={nextPopup.totalRuns}
          onNavigate={() => setNextPopup(null)}
          onSkip={() => setNextPopup(null)}
          onClose={() => setNextPopup(null)}
        />
      )}
    </div>
  );
};
